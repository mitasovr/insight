# Kind cluster config for local development
# Maps container ports to localhost for service access
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: insight
nodes:
  - role: control-plane
    image: kindest/node:v1.29.2
    extraPortMappings:
      # Ingress (frontend + api-gateway)
      - containerPort: 80
        hostPort: 8000
        protocol: TCP
      # Argo UI
      - containerPort: 30500
        hostPort: 30500
        protocol: TCP
      # ClickHouse HTTP
      - containerPort: 30123
        hostPort: 30123
        protocol: TCP
      # ClickHouse native
      - containerPort: 30900
        hostPort: 30900
        protocol: TCP
