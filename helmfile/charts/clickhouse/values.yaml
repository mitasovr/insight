image:
  repository: clickhouse/clickhouse-server
  tag: "25.3"
  pullPolicy: IfNotPresent

# Databases to create on first boot. Connector-agnostic — operator (or
# umbrella) supplies the list. Additional bronze schemas beyond this
# list are created lazily by the ingestion pipelines themselves.
initDatabases: []

# Login user. NO default — operator (or umbrella) MUST set explicitly.
username: ""

# Password is sourced from a Secret. NO default — every install MUST
# wire `auth.existingSecret` + `auth.existingSecretPasswordKey`. The
# umbrella does this automatically via `clickhouse.passwordSecret`,
# which it forwards to the subchart as `auth.existingSecret/Key`.
auth:
  existingSecret: ""
  existingSecretPasswordKey: ""

persistence:
  size: 5Gi

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Probe overrides. Defaults soften k8s' implicit `timeoutSeconds: 1` so
# CH `/ping` doesn't get killed under bulk-insert load — see template
# comment for rationale. Empty {} means "use template defaults".
livenessProbe: {}
readinessProbe: {}

# TTL for system.*_log tables. Without this, query_log/trace_log/etc.
# grow unbounded — observed 55 GB in 2 weeks of dev-cluster activity,
# ballooned WSL2 VHDX to 336 GB. See ADR-0008. Existing tables retain
# their schema; apply ALTER TABLE MODIFY TTL on running clusters once.
systemLogsTtl:
  enabled: true
  # Must be >= 1. Setting `0` is syntactically valid but semantically
  # destructive — every row would be evicted on the next merge.
  days: 1
  logs:
    - query_log
    - query_thread_log
    - query_metric_log
    - trace_log
    - part_log
    - metric_log
    - asynchronous_metric_log
    - text_log
    - processors_profile_log
    - latency_log
    - error_log
