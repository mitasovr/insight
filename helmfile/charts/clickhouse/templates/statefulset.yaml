apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "clickhouse.fullname" . }}
  labels:
    {{- include "clickhouse.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "clickhouse.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "clickhouse.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "clickhouse.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global }}
      {{- with .imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      # Suppress the legacy `<SVC>_SERVICE_HOST/PORT/…` Docker-link env-vars
      # kubelet auto-injects for every Service in the namespace at pod-start
      # (see api-gateway deployment for the longer explanation).
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      containers:
        - name: clickhouse
          image: "{{ required "image.repository is required" .Values.image.repository }}:{{ required "image.tag is required" .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8123
            - name: native
              containerPort: 9000
          env:
            - name: CLICKHOUSE_USER
              value: {{ required "username is required" .Values.username | quote }}
            # NO `else` fallback to inline auth.password — every install MUST
            # wire an existingSecret. The umbrella does this automatically;
            # standalone installs of this subchart must set both fields.
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "auth.existingSecret is required (no inline-password fallback)" .Values.auth.existingSecret | quote }}
                  key:  {{ required "auth.existingSecretPasswordKey is required"                    .Values.auth.existingSecretPasswordKey | quote }}
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            {{- if .Values.systemLogsTtl.enabled }}
            - name: system-logs-ttl
              mountPath: /etc/clickhouse-server/config.d/system-logs-ttl.xml
              subPath: system-logs-ttl.xml
              readOnly: true
            {{- end }}
          # Database provisioning happens out-of-band from the umbrella's
          # clickhouse-init-svcdbs-job.yaml post-install Hook against
          # `clickhouse.host` (works for bundled or external). The
          # previous /docker-entrypoint-initdb.d ConfigMap mount only
          # covered the bundled mode and was removed for consistency
          # with the cross-mode Hook.
          # CH `/ping` can exceed the k8s default `timeoutSeconds: 1` under
          # sustained bulk-insert load (initial Airbyte backfill, large
          # connector syncs, dbt full-refresh). Defaults here give CH
          # 5s × 30s × 6 = ~3 min of slow `/ping` before kubelet kills the
          # pod (liveness) and a tighter 3s × 10s for readiness so Service
          # traffic reflects pod capacity quickly without flapping. See
          # #275 B10. Operators can override the timings via
          # `clickhouse.livenessProbe.*` / `readinessProbe.*` in the
          # umbrella values.
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds  | default 10 }}
            periodSeconds:       {{ .Values.livenessProbe.periodSeconds        | default 30 }}
            timeoutSeconds:      {{ .Values.livenessProbe.timeoutSeconds       | default 5  }}
            failureThreshold:    {{ .Values.livenessProbe.failureThreshold     | default 6  }}
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds | default 5  }}
            periodSeconds:       {{ .Values.readinessProbe.periodSeconds       | default 10 }}
            timeoutSeconds:      {{ .Values.readinessProbe.timeoutSeconds      | default 3  }}
            failureThreshold:    {{ .Values.readinessProbe.failureThreshold    | default 3  }}
      {{- if .Values.systemLogsTtl.enabled }}
      volumes:
        - name: system-logs-ttl
          configMap:
            name: {{ include "clickhouse.fullname" . }}-system-logs-ttl
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.global }}
        {{- if .storageClass }}
        storageClassName: {{ .storageClass | quote }}
        {{- end }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
