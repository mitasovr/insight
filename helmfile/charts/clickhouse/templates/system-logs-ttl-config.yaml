{{/*
ClickHouse system.*_log tables grow indefinitely by default. With our
workload (Airbyte ingestion + dbt rebuilds + background merges over
113k+ parts) they accumulated 55 GB in ~2 weeks, ballooning the WSL2
VHDX to 336 GB and triggering OOM-style merges. See ADR-0008.

This ConfigMap is mounted at /etc/clickhouse-server/config.d/ and
overrides the TTL of every relevant system log. Existing tables keep
their schema; only NEW ones inherit this — apply ALTER TABLE MODIFY
TTL manually on running clusters (see ADR-0008 §Migration).
*/}}
{{- if .Values.systemLogsTtl.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clickhouse.fullname" . }}-system-logs-ttl
  labels:
    {{- include "clickhouse.labels" . | nindent 4 }}
data:
  system-logs-ttl.xml: |
    <clickhouse>
      {{- range $log := .Values.systemLogsTtl.logs }}
      <{{ $log }}>
        <ttl>event_date + INTERVAL {{ $.Values.systemLogsTtl.days | int }} DAY DELETE</ttl>
      </{{ $log }}>
      {{- end }}
    </clickhouse>
{{- end }}
