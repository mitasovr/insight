##
## sealed-secrets-controller — local k3s overlay.
##
## fullnameOverride matches the SPEC convention `sealed-secrets-controller`
## so kubeseal can locate the controller without flags.
##
fullnameOverride: sealed-secrets-controller

resources:
  requests: { cpu: 10m, memory: 64Mi }
  limits:   { cpu: 200m, memory: 256Mi }

# Local — keep the controller's keypair in-cluster only. For real envs
# you may want to back up the master key and restore policy explicitly.
# Go time.ParseDuration: only h/m/s; "30d" is not valid.
keyrenewperiod: "720h"
