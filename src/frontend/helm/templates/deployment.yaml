apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insight-frontend.fullname" . }}
  labels:
    {{- include "insight-frontend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "insight-frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "insight-frontend.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.global }}
      {{- with .imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      # Suppress the legacy `<SVC>_SERVICE_HOST/PORT/…` Docker-link env-vars
      # kubelet auto-injects for every Service in the namespace at pod-start
      # (see api-gateway deployment for the longer explanation).
      enableServiceLinks: false
      containers:
        - name: frontend
          image: "{{ required "image.repository is required" .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- /* Refuse OIDC + devUserEmail together — the entrypoint
                 catches it too, but failing at template time gives a
                 cleaner error than a CrashLoopBackOff. */}}
          {{- if and (or .Values.oidc.issuer .Values.oidc.clientId) .Values.devUserEmail }}
            {{- fail "frontend: devUserEmail and oidc.{issuer,clientId} are mutually exclusive. Set one path, not both." }}
          {{- end }}
          {{- if or .Values.oidc.issuer .Values.oidc.clientId .Values.devUserEmail }}
          env:
            {{- if .Values.oidc.issuer }}
            - name: OIDC_ISSUER
              value: {{ .Values.oidc.issuer | quote }}
            {{- end }}
            {{- if .Values.oidc.clientId }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.oidc.clientId | quote }}
            {{- end }}
            {{- if or .Values.oidc.issuer .Values.oidc.clientId }}
            - name: OIDC_SCOPES
              value: {{ required "oidc.scopes is required when oidc.issuer or oidc.clientId is set" .Values.oidc.scopes | quote }}
            {{- end }}
            {{- if .Values.devUserEmail }}
            - name: DEV_USER_EMAIL
              value: {{ .Values.devUserEmail | quote }}
            {{- end }}
          {{- end }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
