apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "claude-team-proxy.fullname" . }}
  labels:
    {{- include "claude-team-proxy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # Create-before-destroy rolling update. With maxSurge=1 and
  # maxUnavailable=0, during a rollout there are briefly TWO pods —
  # the new one running through Chromium boot + CF clearance, then the
  # old one is terminated once the new is Ready. From claude.ai's side
  # this means a short window (~30s) with two browser sessions sharing
  # the same sessionKey. If session-sweep / rate-limit ever becomes a
  # concern, flip to maxSurge=0 / maxUnavailable=1 (brief downtime,
  # no overlap) — the connector retries on transient 502/504 so the
  # cost is acceptable.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "claude-team-proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "claude-team-proxy.selectorLabels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      # Match the `node` user baked into node:22-slim (UID/GID 1000).
      # The Dockerfile already `USER node`s, this is belt-and-braces.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: proxy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          # SESSION_KEY comes from the Secret created by secret.yaml.
          # envFrom mounts ALL keys in the Secret as env vars — currently
          # just SESSION_KEY, but easy to extend later.
          envFrom:
            - secretRef:
                name: {{ include "claude-team-proxy.fullname" . }}
          # Non-secret config is plain env. Empty string means "use the
          # default baked into src/config.ts".
          env:
            - name: PORT
              value: {{ .Values.service.port | quote }}
            - name: HEADLESS
              value: {{ .Values.headless | quote }}
            {{- if .Values.upstreamBaseUrl }}
            - name: UPSTREAM_BASE_URL
              value: {{ .Values.upstreamBaseUrl | quote }}
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            # Aggressive capability drop. Chromium running as non-root
            # does not need Linux capabilities to spawn its renderer /
            # GPU child processes — chrome-sandbox is replaced by the
            # user-namespace sandbox (zygote model), which is namespace-
            # gated, not capability-gated.
            #
            # Per CR feedback on PR #536 (replaces a previous "drop ALL
            # is too strict" comment that was an unverified assertion).
            # Operator should verify on first rollout that boot + CF
            # clearance + at least one stream sync all succeed; if
            # something breaks under drop:[ALL], comment out the block
            # to fall back to default capabilities and file a follow-up.
            capabilities:
              drop:
                - ALL
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
