replicaCount: 1

podAnnotations: {}

image:
  repository: ghcr.io/constructorfabric/insight-analytics-api
  tag: ""                  # MUST be set by the operator. No `:latest` default.
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8081

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Pre-provisioned Secret with the full analytics-api configuration:
#   ANALYTICS__database_url, ANALYTICS__clickhouse_*, ANALYTICS__redis_url,
#   ANALYTICS__identity_url, ANALYTICS__bind_addr,
#   ANALYTICS__metric_catalog__tenant_default_id (optional).
#
# `ANALYTICS__metric_catalog__tenant_default_id` (UUID, optional): single-
# tenant fallback for the Metric Catalog per DESIGN §2.2
# `cpt-metric-cat-constraint-tenant-default`. When set, requests without an
# `X-Insight-Tenant-Id` header resolve to this tenant; when unset (multi-
# tenant install), tenant-less requests are rejected with a canonical
# `invalid_argument` envelope carrying `field_violations[{field:
# "tenant_id", reason: "TENANT_UNRESOLVED"}]`. Mirrors
# `IDENTITY__identity__tenant_default_id` in the identity service. The
# session-bound tenant ALWAYS wins over the configured default (security
# invariant; see `domain::auth::TenantAuthorization`).
#
# The umbrella populates `insight-analytics-api-config` automatically; for
# standalone installs the operator pre-creates an equivalent Secret and
# sets `existingSecret` to its name.
existingSecret: ""

# Health probes
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
