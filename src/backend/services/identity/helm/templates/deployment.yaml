apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insight-identity.fullname" . }}
  labels:
    {{- include "insight-identity.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "insight-identity.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "insight-identity.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.global }}
      {{- with .imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      # Suppress the legacy `<SVC>_SERVICE_HOST/PORT/…` Docker-link env-vars
      # kubelet auto-injects for every Service in the namespace at pod-start
      # (see api-gateway deployment for the longer explanation).
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      {{- if .Values.waitForMariadb.enabled }}
      initContainers:
        - name: wait-for-mariadb
          image: "{{ .Values.waitForMariadb.image.repository }}:{{ .Values.waitForMariadb.image.tag }}"
          imagePullPolicy: IfNotPresent
          envFrom:
            # The umbrella publishes MARIADB_HOST + MARIADB_PORT here via
            # `insight.mariadb.host` / `.port` helpers — works for both
            # mariadb.deploy=true and =false. The chart is published only
            # as part of the umbrella, so this ref is hardcoded.
            - configMapRef:
                name: {{ .Release.Name }}-platform
          command:
            - sh
            - -c
            - |
              set -eu
              host="$MARIADB_HOST"
              port="${MARIADB_PORT:-3306}"
              timeout={{ .Values.waitForMariadb.timeoutSeconds }}
              elapsed=0
              echo "wait-for-mariadb: ${host}:${port} (timeout=${timeout}s)"
              until nc -z "${host}" "${port}"; do
                if [ "${elapsed}" -ge "${timeout}" ]; then
                  echo "wait-for-mariadb: ERROR — ${host}:${port} not reachable within ${timeout}s" >&2
                  exit 1
                fi
                sleep 2
                elapsed=$((elapsed + 2))
              done
              echo "wait-for-mariadb: ${host}:${port} is up after ${elapsed}s"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      {{- end }}
      containers:
        - name: identity
          image: "{{ required "image.repository is required" .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ required "existingSecret is required (umbrella provides `insight-identity-config` when identity.deploy=true; standalone installs supply their own)" .Values.existingSecret | quote }}
          env:
            - name: ASPNETCORE_URLS
              value: "http://0.0.0.0:{{ .Values.service.port }}"
          securityContext:
            allowPrivilegeEscalation: false
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
