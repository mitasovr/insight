# Non-secret defaults. Deployment-specific values (DB credentials,
# tenant pinning) come from env vars via the `insight-identity-config`
# Secret in cluster, `Properties/launchSettings.json` for local F5, or
# `.env.local` / `dotnet user-secrets` for local CLI.
#
# MariaDB pool/timeout knobs are intentionally absent — zero/unset = use
# MySqlConnector defaults (ConnectionTimeout=15s, CommandTimeout=30s).
# Forcing CommandTimeout below ~30s suffocates the post-handshake
# `SET NAMES` round-trip and surfaces as `Connect Timeout expired`.
identity:
  bind_addr: "0.0.0.0:8082"
  expand_subordinates: true
  max_subordinate_depth: 16
  org_chart_source_type: "bamboohr"

Serilog:
  MinimumLevel:
    Default: Information
    Override:
      Microsoft.AspNetCore: Warning
      Microsoft.Hosting.Lifetime: Information
