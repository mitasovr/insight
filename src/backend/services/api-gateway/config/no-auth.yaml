# Insight API Gateway — Local Development (No Auth)
#
# Usage: insight-api-gateway run -c config/no-auth.yaml
#
# All requests get a default SecurityContext (root access).
# Do NOT use in production.

server:
  home_dir: "~/.insight"

logging:
  default:
    console_level: debug

gears:
  api-gateway:
    config:
      bind_addr: "0.0.0.0:8080"
      enable_docs: true
      cors_enabled: true
      prefix_path: "/api"
      openapi:
        title: "Insight API (dev)"
        version: "0.1.0-dev"
        description: "Insight Platform API — auth disabled"
      auth_disabled: true

  auth-info:
    config:
      issuer_url: ""
      client_id: ""
      redirect_uri: "http://localhost:3000/callback"

  # The oidc-authn-plugin gear is registered in the binary regardless of
  # whether auth is in use. It rejects an empty issuer_url at startup, so
  # we hand it a placeholder URL that is never actually contacted because
  # api-gateway.auth_disabled=true short-circuits the validator. Replace
  # with a real issuer when flipping AUTH_DISABLED off.
  oidc-authn-plugin:
    config:
      issuer_url: "https://no-auth.local/oauth2/default"

  gear-orchestrator:
    config: {}

  grpc-hub:
    config:
      listen_addr: "uds:///tmp/insight-grpc"

  authn-resolver:
    config:
      vendor: "hyperspot"

  authz-resolver:
    config:
      vendor: "hyperspot"

  static-authz-plugin:
    config:
      vendor: "hyperspot"
      priority: 100

  tenant-resolver:
    config:
      vendor: "hyperspot"

  # Zero-config in the gears-rust split: the plugin now derives the tenant
  # from the SecurityContext at request time. With api-gateway.auth_disabled,
  # toolkit-security injects DEFAULT_TENANT_ID (00000000-df51-5b42-9538-…).
  single-tenant-tr-plugin:
    config:
      vendor: "hyperspot"
      priority: 20

  proxy:
    config:
      routes:
        - prefix: "/analytics"
          upstream: "http://analytics-api:8081"
        - prefix: "/identity"
          upstream: "http://identity:8082"
