# Insight API Gateway Configuration
#
# Environment variable overrides: APP__gears__<gear>__config__<key>
# Example: APP__gears__oidc-authn-plugin__config__issuer_url=https://dev-123.okta.com/oauth2/default

server:
  home_dir: "/app/data"

logging:
  # Console-only logging (stdout → K8s log collector → Loki).
  # File logging disabled — container filesystem is ephemeral.
  default:
    console_level: info
  api-gateway:
    console_level: debug

gears:
  api-gateway:
    config:
      bind_addr: "0.0.0.0:8080"
      enable_docs: false
      cors_enabled: true
      prefix_path: "/api"
      openapi:
        title: "Insight API"
        version: "0.1.0"
        description: "Insight Platform API"
      defaults:
        body_limit_bytes: 16777216  # 16 MB
        rate_limit:
          rps: 100
          burst: 50
          in_flight: 32

      # Set to true to disable auth for local development.
      # When false, OIDC plugin validates JWT tokens.
      auth_disabled: false

  gear-orchestrator:
    config: {}

  grpc-hub:
    config:
      listen_addr: "uds:///tmp/insight-grpc"

  # ─── Authentication ─────────────────────────────────────────
  authn-resolver:
    config:
      vendor: "hyperspot"

  # OIDC/JWT plugin — validates bearer tokens against IdP (Okta, Keycloak, etc.)
  # Required env vars for production:
  #   APP__gears__oidc-authn-plugin__config__issuer_url
  #   APP__gears__oidc-authn-plugin__config__audience
  oidc-authn-plugin:
    config:
      vendor: "hyperspot"
      priority: 50
      issuer_url: "${OIDC_ISSUER_URL}"    # e.g., https://dev-12345.okta.com/oauth2/default
      audience: "${OIDC_AUDIENCE}"         # e.g., api://insight
      # jwks_url: ""                       # Override if JWKS URL differs from {issuer}/v1/keys
      jwks_refresh_interval_seconds: 300
      tenant_claim: "tenant_id"            # JWT claim containing tenant UUID
      subject_type: "user"
      leeway_seconds: 60

  # ─── Auth Info (public endpoint for frontend) ───────────────
  # NOTE: issuer_url MUST match oidc-authn-plugin.config.issuer_url above.
  # Both are set from the same OIDC_ISSUER_URL env var / Helm oidc.issuer value.
  auth-info:
    config:
      issuer_url: "${OIDC_ISSUER_URL}"
      client_id: "${OIDC_CLIENT_ID}"
      redirect_uri: "${OIDC_REDIRECT_URI}"
      # Space-separated. IdP-specific — see AuthInfoConfig.scopes docs.
      # Without a resource scope, Entra defaults the access token audience
      # to Microsoft Graph and the gateway rejects it.
      scopes: "${OIDC_SCOPES}"

  # ─── Authorization ──────────────────────────────────────────
  authz-resolver:
    config:
      vendor: "hyperspot"

  # Static authz plugin (dev stub — allows all, scoped to tenant).
  # Replace with insight-authz-plugin for org-tree + RBAC in production.
  static-authz-plugin:
    config:
      vendor: "hyperspot"
      priority: 100

  # ─── Tenant Resolution ─────────────────────────────────────
  tenant-resolver:
    config:
      vendor: "hyperspot"

  # Zero-config in the gears-rust split: the plugin derives the tenant from
  # the SecurityContext at request time (JWT claims when auth is enabled, or
  # toolkit-security's DEFAULT_TENANT_ID when auth_disabled=true).
  single-tenant-tr-plugin:
    config:
      vendor: "hyperspot"
      priority: 20

  # ─── Reverse Proxy ─────────────────────────────────────────
  # Routes requests to downstream services after authentication.
  # Each route strips its prefix and forwards to the upstream URL.
  proxy:
    config:
      routes:
        - prefix: "/analytics"
          upstream: "${PROXY_ANALYTICS_URL:=http://analytics-api:8081}"

# ─── Local development ──────────────────────────────────────
# To run without OIDC (auth disabled), override:
#   gears.api-gateway.config.auth_disabled: true
# Or use the no-auth config:
#   insight-api-gateway run -c config/no-auth.yaml
