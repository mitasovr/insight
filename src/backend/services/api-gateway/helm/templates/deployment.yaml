apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insight-api-gateway.fullname" . }}
  labels:
    {{- include "insight-api-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "insight-api-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "insight-api-gateway.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if and (not .Values.authDisabled) (not .Values.oidc.existingSecret) }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global }}
      {{- with .imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      # Suppress the legacy `<SVC>_SERVICE_HOST/PORT/…` Docker-link env-vars
      # kubelet auto-injects for every Service in the namespace at pod-start.
      # We discover dependencies via DNS (`*.svc.cluster.local`); the env-var
      # mechanism only adds noise (~100+ vars in this namespace), creates
      # startup-ordering coupling, and confuses `env` output by colliding
      # with our own `APP__*` config-prefix scheme.
      enableServiceLinks: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api-gateway
          image: "{{ required "image.repository is required" .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/insight-api-gateway"]
          args: ["-c", "/app/config/gateway.yaml", "run"]
          volumeMounts:
            - name: gateway-config
              mountPath: /app/config/gateway.yaml
              subPath: gateway.yaml
              readOnly: true
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "insight-api-gateway.fullname" . }}-config
            {{- if not .Values.authDisabled }}
            - secretRef:
                name: {{ .Values.oidc.existingSecret | default (printf "%s-oidc" (include "insight-api-gateway.fullname" .)) }}
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: gateway-config
          configMap:
            name: {{ include "insight-api-gateway.fullname" . }}-config
