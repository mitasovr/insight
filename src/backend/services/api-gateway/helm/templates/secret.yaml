{{- if and (not .Values.authDisabled) (not .Values.oidc.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "insight-api-gateway.fullname" . }}-oidc
  labels:
    {{- include "insight-api-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  APP__gears__oidc-authn-plugin__config__issuer_url: {{ required "oidc.issuer is required when auth is enabled and oidc.existingSecret is not set" .Values.oidc.issuer | quote }}
  APP__gears__oidc-authn-plugin__config__audience: {{ .Values.oidc.audience | quote }}
  APP__gears__auth-info__config__issuer_url: {{ required "oidc.issuer is required when auth is enabled and oidc.existingSecret is not set" .Values.oidc.issuer | quote }}
  APP__gears__auth-info__config__client_id: {{ required "oidc.clientId is required when auth is enabled and oidc.existingSecret is not set" .Values.oidc.clientId | quote }}
  APP__gears__auth-info__config__redirect_uri: {{ required "oidc.redirectUri is required when auth is enabled and oidc.existingSecret is not set" .Values.oidc.redirectUri | quote }}
  APP__gears__auth-info__config__scopes: {{ required "oidc.scopes is required when auth is enabled and oidc.existingSecret is not set (space-separated, IdP-specific)" .Values.oidc.scopes | quote }}
  {{- if .Values.oidc.jwksUrl }}
  APP__gears__oidc-authn-plugin__config__jwks_url: {{ .Values.oidc.jwksUrl | quote }}
  {{- end }}
{{- end }}
