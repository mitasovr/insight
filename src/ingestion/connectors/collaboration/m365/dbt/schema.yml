version: 2

sources:
  - name: bronze_m365
    # Source freshness (TAF #1322). WINDOWED connector — verified on live data:
    # the Graph getReport endpoint re-emits the whole `reportPeriod` window
    # every sync, so `_airbyte_extracted_at` is re-stamped each run and tracks
    # sync liveness, NOT data freshness (measured: extracted_at 10.6h fresh
    # while reportRefreshDate 108.7h / 4.5d stale; 24 business dates re-emitted
    # in the last extraction batch). Anchor on the report's own business date
    # and use the report tier to absorb Graph's 24–48h publish lag.
    freshness:
      warn_after: {count: 72, period: hour}
      error_after: {count: 120, period: hour}
    # reportRefreshDate is Nullable(String) 'YYYY-MM-DD'; dbt freshness needs a
    # timestamp expression, so parse it (verified against live ClickHouse).
    loaded_at_field: parseDateTimeBestEffortOrNull(reportRefreshDate)
    schema: bronze_m365
    tables:
      - name: email_activity
      - name: teams_activity
      - name: onedrive_activity
      - name: sharepoint_activity

models:
  - name: m365__collab_chat_activity
    description: "M365 Teams chat activity → staging, feeds class_collab_chat_activity"
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: insight_source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: person_key
        tests:
          - not_null
      - name: date
        tests:
          - not_null

  - name: m365__collab_meeting_activity
    description: "M365 Teams meeting activity → staging, feeds class_collab_meeting_activity"
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: insight_source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: person_key
        tests:
          - not_null
      - name: date
        tests:
          - not_null

  - name: m365__collab_email_activity
    description: "M365 Outlook email activity → staging, feeds class_collab_email_activity"
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: insight_source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: person_key
        tests:
          - not_null
      - name: date
        tests:
          - not_null

  - name: m365__collab_document_activity_onedrive
    description: "M365 OneDrive document activity → staging, unioned into class_collab_document_activity"
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: insight_source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: person_key
        tests:
          - not_null
      - name: date
        tests:
          - not_null
      - name: product
        tests:
          - not_null
          - accepted_values:
              values: ['onedrive']

  - name: m365__collab_document_activity_sharepoint
    description: "M365 SharePoint document activity → staging, unioned into class_collab_document_activity"
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: insight_source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: person_key
        tests:
          - not_null
      - name: date
        tests:
          - not_null
      - name: product
        tests:
          - not_null
          - accepted_values:
              values: ['sharepoint']
