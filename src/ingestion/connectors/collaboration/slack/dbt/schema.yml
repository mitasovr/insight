version: 2

sources:
  - name: bronze_slack
    # Source freshness (TAF #1322). WINDOWED connector — Slack
    # admin.analytics.getFile re-emits a fixed window each sync, so
    # _airbyte_extracted_at tracks sync liveness, not data freshness. Anchor on
    # the report's `date` (column verified in ClickHouse; windowed behavior
    # inferred — no live rows in Eternal). report_extended tier: Slack analytics
    # has a documented ~3-day publish lag (up to 5 during Slack maintenance).
    freshness:
      warn_after: {count: 120, period: hour}
      error_after: {count: 168, period: hour}
    # `date` is String 'YYYY-MM-DD'; parse for the freshness timestamp compare.
    loaded_at_field: parseDateTimeBestEffortOrNull(date)
    schema: bronze_slack
    tables:
      - name: users_details

models:
  - name: slack__users_latest
    description: "Latest analytics snapshot per Slack user (tenant_id, source_id, user_id). Email is kept as a tracked attribute so downstream SCD2 records email changes instead of creating new entities."
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: source_id
        tests:
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: email
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique

  - name: slack__users_snapshot
    description: "Slack users SCD2 snapshot — tracks email, is_guest, is_billable_seat changes over time."
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null

  - name: slack__users_fields_history
    description: "Slack users field-level change history (email, is_guest, is_billable_seat)."
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: source_id
        tests:
          - not_null

  - name: slack__collab_chat_activity
    description: "Slack daily chat activity per user (admin.analytics.getFile). Feeds silver.class_collab_chat_activity."
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: insight_source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: person_key
        tests:
          - not_null
      - name: date
        tests:
          - not_null
      - name: data_source
        tests:
          - not_null
