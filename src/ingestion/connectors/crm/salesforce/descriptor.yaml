name: salesforce
version: "2.0.0"
type: cdk
schedule: "0 5 * * *"
workflow: sync

# CI build metadata + runtime image refs (ADR-0016). images.cdk.image is
# empty until first CI build from .github/workflows/build-images.yml,
# which patches this field via the bump-descriptors job.
images:
  cdk:
    name: source-salesforce-insight
    dockerfile: ./Dockerfile
    context: .
    image: "ghcr.io/constructorfabric/source-salesforce-insight:2026.05.22.13.03-5cdda7c"

dbt_select: "tag:salesforce+"

connection:
  namespace: "bronze_salesforce"
secret:
  required_fields:
    - salesforce_instance_url
    - salesforce_client_id
    - salesforce_client_secret
    - salesforce_start_date
