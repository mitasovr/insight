name: hubspot
version: "2.0.0"
type: cdk
schedule: "0 6 * * *"
workflow: sync

# CI build metadata + runtime image refs (ADR-0016). CI scans `images:`
# via dynamic discovery on every run; reconcile reads images.cdk.image
# when registering the Airbyte CDK source definition.
images:
  cdk:
    name: source-hubspot-insight
    dockerfile: ./Dockerfile
    context: .
    image: "ghcr.io/cyberfabric/source-hubspot-insight:2026.05.29.14.36-e60cf1f"

dbt_select: "tag:hubspot+"

connection:
  namespace: "bronze_hubspot"
secret:
  required_fields:
    - hubspot_access_token
