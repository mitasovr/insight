version: 2

sources:
  - name: bronze_confluence
    schema: bronze_confluence
    tables:
      - name: wiki_spaces
      - name: wiki_pages
      - name: wiki_page_versions
      - name: wiki_footer_comments
      - name: wiki_footer_comment_replies
      - name: wiki_inline_comments
      - name: wiki_inline_comment_replies

  # bronze_jira.jira_user is declared by the Jira connector
  # (connectors/task-tracking/jira/dbt/schema.yml). Staging models below
  # reference it via source('bronze_jira', 'jira_user') for author email
  # resolution, guarded with adapter.get_relation() so dbt still compiles
  # if Jira is not provisioned for the tenant.

models:
  - name: confluence__wiki_pages
    description: >
      Bronze → Silver step 1: Confluence pages → class_wiki_pages. One row
      per (tenant, source, page) with space/author/editor dimensions and
      version count. author_email / last_editor_email resolved via LEFT JOIN
      with bronze_jira.jira_user on accountId (NULL fallback when Jira is
      not provisioned).
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: page_id
        tests:
          - not_null
      - name: version_count
        tests:
          - not_null
      - name: source
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['confluence']
      - name: data_source
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['insight_confluence']

  - name: confluence__wiki_activity
    description: >
      Bronze → Silver step 1: Confluence page versions → class_wiki_activity.
      Per-user per-day edit activity with counts of pages_edited, total_edits
      (logical sessions per #259), pages_created. author_email resolved via
      bronze_jira.jira_user JOIN with NULL fallback. `major_edits` and
      `minor_edits` were dropped per #260 — the upstream `minor_edit` flag
      is dead at the Atlassian Cloud API level.
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: author_id
        tests:
          - not_null
      - name: day
        tests:
          - not_null
      - name: pages_edited
        tests:
          - not_null
      - name: total_edits
        tests:
          - not_null
      - name: pages_created
        tests:
          - not_null
      - name: source
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['confluence']
      - name: data_source
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['insight_confluence']

  - name: confluence__wiki_engagement
    description: >
      Bronze → Silver: Confluence comments → class_wiki_engagement. Per
      (tenant, source, page, day) summary of comment activity across all
      4 comment streams (footer top-level, footer replies, inline
      top-level, inline replies). Issue #285. Aggregations: total_comments,
      footer_comments, inline_comments, replies, unique_commenters,
      unresolved_inline_count.
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: page_id
        tests:
          - not_null
      - name: day
        tests:
          - not_null
      - name: total_comments
        tests:
          - not_null
      - name: source
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['confluence']
      - name: data_source
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['insight_confluence']
