name: confluence
version: "2026.05.04"
schedule: "0 4 * * *"
workflow: sync

# Silver routing (class_wiki_pages, class_wiki_activity, class_wiki_engagement)
# enabled via dbt tags on the staging models (silver:class_wiki_pages,
# silver:class_wiki_activity, silver:class_wiki_engagement).
# silver_targets prohibited per Connector Spec §4.10 — Silver determined by dbt_select tags.
dbt_select: "tag:confluence+"

connection:
  namespace: bronze_confluence
secret:
  required_fields:
    - confluence_instance_url
    - confluence_email
    - confluence_api_token
    - confluence_start_date
