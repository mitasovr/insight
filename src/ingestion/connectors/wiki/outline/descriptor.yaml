name: outline
# 1.1.0: revisions.list substream now IGNOREs HTTP 404 — a document deleted
# between documents.list enumeration and the per-doc revisions fetch no
# longer fails the whole sync (Jira/Zendesk substream large-data lesson;
# mirrors confluence). Additive → MINOR per ADR-0015.
version: "1.1.0"
schedule: "0 4 * * *"
workflow: sync

# Silver routing (class_wiki_pages, class_wiki_activity, class_wiki_engagement)
# enabled via dbt tags on the staging models (silver:class_wiki_pages,
# silver:class_wiki_activity, silver:class_wiki_engagement).
# silver_targets prohibited per Connector Spec §4.10 — Silver determined by dbt_select tags.
dbt_select: "tag:outline+"

connection:
  namespace: bronze_outline
secret:
  required_fields:
    - outline_instance_url
    - outline_api_token
    - outline_start_date
