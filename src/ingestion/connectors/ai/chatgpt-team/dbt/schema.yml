version: 2

sources:
  - name: bronze_chatgpt_team
    # Source freshness (TAF #1322). Source-level default = _airbyte_extracted_at
    # (sync-liveness) for the roster table; the WINDOWED daily/snapshot tables
    # override below to anchor on their business date. ChatGPT Team re-emits a
    # fixed window every sync, so extracted_at is false-green for them — VERIFIED
    # on live data (extracted_at ~8.6h fresh while `date` 60–85h stale). Report
    # tier absorbs the vendor publish lag.
    freshness:
      warn_after: {count: 36, period: hour}
      error_after: {count: 72, period: hour}
    loaded_at_field: _airbyte_extracted_at
    schema: bronze_chatgpt_team
    tables:
      - name: chatgpt_team_seats   # roster — sync-liveness default is correct
      - name: chatgpt_team_chat_activity      # VERIFIED windowed
        loaded_at_field: parseDateTimeBestEffortOrNull(date)
        freshness:
          warn_after: {count: 72, period: hour}
          error_after: {count: 120, period: hour}
      - name: chatgpt_team_codex_user_daily   # VERIFIED windowed
        loaded_at_field: parseDateTimeBestEffortOrNull(date)
        freshness:
          warn_after: {count: 72, period: hour}
          error_after: {count: 120, period: hour}
      - name: chatgpt_team_subscription_usage    # inferred windowed (snapshot_date)
        loaded_at_field: parseDateTimeBestEffortOrNull(snapshot_date)
        freshness:
          warn_after: {count: 72, period: hour}
          error_after: {count: 120, period: hour}
      - name: chatgpt_team_subscription_balance  # inferred windowed (snapshot_date)
        loaded_at_field: parseDateTimeBestEffortOrNull(snapshot_date)
        freshness:
          warn_after: {count: 72, period: hour}
          error_after: {count: 120, period: hour}

models:
  - name: chatgpt_team__ai_dev_usage
    description: >
      Bronze → Silver: ChatGPT Team per-user per-day Codex usage →
      class_ai_dev_usage (tool='codex', source='chatgpt_team'). Sourced from
      chatgpt_team_codex_user_daily. session_count ← n_threads;
      lines_added ← lines_added; cost_cents NULL (credits ≠ currency).
      Codex-only counters (credits/n_turns/text_tokens/current_streak) kept in
      tool_action_breakdown_json. Column contract matches claude_team__ai_dev_usage.
    columns:
      - name: unique_key
        description: "Composite dedup key: tenant-source-email-day"
        tests: [not_null, unique]
      - name: email
        description: "Work email (lowercased) — identity key"
        tests: [not_null]
      - name: day
        description: "Usage date (UTC) — toDate(date)"
        tests: [not_null]
      - name: tool
        description: "Always 'codex'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['codex']
      - name: source
        description: "Always 'chatgpt_team'"
        tests: [not_null]
      - name: _version
        description: "RMT version — toUnixTimestamp64Milli(_airbyte_extracted_at) per ADR-0001"
        tests: [not_null]

  - name: chatgpt_team__ai_assistant_usage
    description: >
      Bronze → Silver: ChatGPT Team per-user per-day chat usage →
      class_ai_assistant_usage (tool='chatgpt', surface='chat',
      source='chatgpt_team'). Sourced from chatgpt_team_chat_activity.
      message_count ← messages; conversation_count NULL (endpoint reports
      messages, not conversations). Per-bucket splits (gpt/tool/connector/project),
      credits_used and seat_type kept in surface_metrics_json. Column contract
      matches claude_enterprise__ai_assistant_usage.
    columns:
      - name: unique_key
        description: "Composite dedup key: tenant-source-email-day-chat"
        tests: [not_null, unique]
      - name: email
        tests: [not_null]
      - name: day
        tests: [not_null]
      - name: tool
        description: "Always 'chatgpt'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['chatgpt']
      - name: surface
        description: "Always 'chat'"
        tests: [not_null]
      - name: _version
        tests: [not_null]

# Bronze→RMT promotion is bootstrapped by chatgpt_team__bronze_promoted.sql.
# subscription_usage/balance have no Silver model yet (billing not in a unified
# stream — OQ-CGT-2); collection_runs is not produced by a declarative source.
