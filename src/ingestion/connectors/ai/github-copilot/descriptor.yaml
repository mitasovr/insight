name: github-copilot
version: "2.2.0"
type: cdk
schedule: "0 2 * * *" # daily at 02:00 UTC (data for day D available ~24h after end-of-day D UTC)
workflow: sync
# CI build metadata + runtime image refs (ADR-0016). images.cdk.image is
# empty until first CI build from .github/workflows/build-images.yml,
# which patches this field via the bump-descriptors job.
images:
  cdk:
    name: source-github-copilot-insight
    dockerfile: ./Dockerfile
    context: .
    image: "ghcr.io/constructorfabric/source-github-copilot-insight:2026.06.17.08.56-25bb740"
# Silver routing: `copilot__ai_dev_usage` feeds class_ai_dev_usage with
# tool='copilot' (active). `copilot__ai_org_usage` is deferred until
# class_ai_org_usage is created — it ships with `enabled=false` and is
# skipped at compile-time, but is included in the `tag:github-copilot+`
# selector below so activation in a follow-up PR is one config change away.
# silver_targets prohibited per Connector Spec §4.10 — Silver determined
# by dbt_select tags on the staging models.
dbt_select: "tag:github-copilot+"
connection:
  namespace: "bronze_github_copilot"
