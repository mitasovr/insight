version: 2

sources:
  - name: bronze_github_copilot
    # Source freshness (TAF #1322). INFERRED, NOT live-verified — bronze_github_copilot
    # has no rows in any reachable install. The metrics streams are per-day
    # reports with a documented ~24h+ publish lag (cursor `day`, confirmed in
    # README + bronze schema); anchoring on `day` with the report tier is correct
    # if the API re-emits a window and harmless if it is strictly incremental.
    # `copilot_seats` is a roster → sync-liveness default. Confirm against live data.
    freshness:
      warn_after: {count: 36, period: hour}
      error_after: {count: 72, period: hour}
    loaded_at_field: _airbyte_extracted_at
    schema: bronze_github_copilot
    tables:
      - name: copilot_seats   # roster — sync-liveness default
      - name: copilot_user_metrics   # inferred windowed (day, ~24h+ report lag)
        loaded_at_field: parseDateTimeBestEffortOrNull(day)
        freshness:
          warn_after: {count: 72, period: hour}
          error_after: {count: 120, period: hour}
      - name: copilot_org_metrics   # inferred windowed (day, ~24h+ report lag)
        loaded_at_field: parseDateTimeBestEffortOrNull(day)
        freshness:
          warn_after: {count: 72, period: hour}
          error_after: {count: 120, period: hour}

models:
  - name: copilot__ai_dev_usage
    description: >
      Bronze → Silver step 1: GitHub Copilot per-user per-day Code activity.
      Feeds class_ai_dev_usage with tool='copilot'. Email is resolved via
      LEFT JOIN to bronze_github_copilot.copilot_seats on user_login; rows
      with no resolvable email are dropped (PRD OQ-COP-1).

      Fields not exposed by Copilot at user grain (total_lines_added,
      cost_cents, commits_count, pull_requests_count) are emitted as NULL.
      Per-user PR/commit attribution is org-level only — see
      `copilot__ai_org_usage` (deferred).

      Activity flags `used_chat`, `used_agent`, `used_cli` are mapped:
      `used_agent` / `used_chat` → 1-marker into `agent_sessions` /
      `chat_requests`. `used_cli` has no column slot and is preserved
      together with the other two as a JSON object in
      `tool_action_breakdown_json`.
    columns:
      - name: insight_tenant_id
        tests:
          - not_null
      - name: source_id
      - name: unique_key
        description: "Composite dedup key: tenant-source-user_login-day"
        tests:
          - not_null
          - unique
      - name: email
        description: "User email resolved via copilot_seats join, lowercased"
        tests:
          - not_null
      - name: api_key_id
        description: "Always NULL — Copilot is attributed by user, not API key"
      - name: day
        tests:
          - not_null
      - name: tool
        description: "Always 'copilot'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['copilot']
      - name: session_count
        description: "Always 1 per active day — Copilot exposes no session counter"
      - name: lines_added
        description: "loc_added_sum from bronze (AI-accepted lines added)"
      - name: lines_removed
        description: "loc_deleted_sum from bronze (AI-accepted lines removed)"
      - name: total_lines_added
        description: "Always NULL — Copilot does not expose total keystrokes"
      - name: total_lines_removed
        description: "Always NULL"
      - name: tool_use_offered
        description: >
          code_generation_activity_count from bronze. Proxy for "suggestions
          offered" — the v2 metrics API does not split offered from rejected.
      - name: tool_use_accepted
        description: "code_acceptance_activity_count from bronze"
      - name: completions_count
        description: >
          Equal to tool_use_accepted (Claude Enterprise convention). Copilot
          does not distinguish completions from other accepted tool actions.
      - name: agent_sessions
        description: "1 if used_agent=true, else NULL"
      - name: chat_requests
        description: "1 if used_chat=true, else NULL"
      - name: cost_cents
        description: "Always NULL — Copilot is per-seat subscription, not metered"
      - name: commits_count
        description: "Always NULL — Copilot does not expose per-user commit attribution"
      - name: pull_requests_count
        description: >
          Always NULL at user grain. Org-level PR data is available in
          `copilot_org_metrics.pull_requests` and feeds the deferred
          `class_ai_org_usage`.
      - name: tool_action_breakdown_json
        description: >
          JSON object with the three boolean activity flags from bronze:
          {"used_chat": bool, "used_agent": bool, "used_cli": bool}.
          Captures `used_cli` (no dedicated column slot) and re-surfaces
          chat/agent flags for consumers that want raw boolean state.
      - name: source
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['copilot']
      - name: data_source
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['insight_github_copilot']
      - name: collected_at
        tests:
          - not_null

  - name: copilot__ai_org_usage
    description: >
      Bronze → Silver step 1: GitHub Copilot org-level daily aggregates.
      DEFERRED — `silver.class_ai_org_usage` does not yet exist; this
      staging ships with `enabled=false` and is not materialised. See
      PRD OQ-COP-2 for activation requirements. When activated, will
      emit one row per (tenant, source, day) with org-wide active-user
      counters, code metrics, and PR aggregates.
    columns:
      - name: insight_tenant_id
      - name: unique_key
      - name: day
      - name: source
      - name: data_source
