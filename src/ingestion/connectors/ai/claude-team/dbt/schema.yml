version: 2

sources:
  - name: bronze_claude_team
    # Source freshness (TAF #1322). Source-level default = _airbyte_extracted_at
    # (sync-liveness) for the roster table; the WINDOWED daily metrics table
    # overrides below. Claude Team re-emits a fixed window every sync, so
    # extracted_at is false-green for code_metrics — VERIFIED on live data
    # (extracted_at ~8.6h fresh while metric_date 60.7h stale). Report tier
    # absorbs the vendor publish lag.
    freshness:
      warn_after: {count: 36, period: hour}
      error_after: {count: 72, period: hour}
    loaded_at_field: _airbyte_extracted_at
    schema: bronze_claude_team
    tables:
      - name: claude_team_members   # roster — sync-liveness default is correct
      - name: claude_team_code_metrics   # VERIFIED windowed
        loaded_at_field: parseDateTimeBestEffortOrNull(metric_date)
        freshness:
          warn_after: {count: 72, period: hour}
          error_after: {count: 120, period: hour}
      - name: claude_team_overage_spend   # per-seat spend snapshot — sync-liveness default

models:
  - name: claude_team__ai_dev_usage
    description: >
      Bronze → Silver step 1: Claude Team per-user per-day Claude Code usage
      → class_ai_dev_usage. Sourced from claude_team_code_metrics (daily
      aggregates pulled via the customer-deployed claude-team-proxy from the
      claude.ai web API). Filtered to status='active' AND non-empty email.
      One row per (tenant, email, metric_date).
      session_count ← total_sessions; lines_added ← total_lines_accepted;
      cost_cents ← total_cost (decimal-as-string → cents, first per-user-per-day
      cost source in Silver); prs_with_cc_count ← prs_with_cc;
      prs_total_count ← total_prs.
    columns:
      - name: insight_tenant_id
        tests:
          - not_null
      - name: source_id
        tests:
          - not_null
      - name: unique_key
        description: "Composite dedup key: tenant-source-email-day"
        tests:
          - not_null
          - unique
      - name: email
        description: "Work email (lowercased) — identity key"
        tests:
          - not_null
      - name: api_key_id
        description: "Always NULL — Claude Team uses session-based auth, not API keys"
      - name: day
        description: "Usage date (UTC) — toDate(metric_date)"
        tests:
          - not_null
      - name: tool
        description: "Always 'claude_code'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['claude_code']
      - name: session_count
        description: >
          total_sessions. DQ note: may be 0 for headless/cc-p invocations
          even when lines_added > 0 — Anthropic excludes those from the counter.
        tests:
          - not_null
      - name: lines_added
        description: "total_lines_accepted — AI-accepted lines added"
        tests:
          - not_null
      - name: lines_removed
        description: "Always NULL — Claude Team does not surface AI-removed lines (structural, not zero)"
      - name: total_lines_added
        description: "Always NULL — total keystrokes not available from the web API"
      - name: total_lines_removed
        description: "Always NULL — total keystrokes not available from the web API"
      - name: tool_use_offered
        description: "Always NULL — inline-completion counters not surfaced by the Team plan API"
      - name: tool_use_accepted
        description: "Always NULL — inline-completion counters not surfaced by the Team plan API"
      - name: agent_sessions
        description: "Always NULL — not exposed by the claude.ai team metrics endpoint"
      - name: chat_requests
        description: "Always NULL — not exposed by the claude.ai team metrics endpoint"
      - name: cost_cents
        description: >
          total_cost cast to cents: toUInt32(round(toFloat64(total_cost) * 100)).
          Claude Team is the first source in Silver with per-user-per-day cost.
          NULL when total_cost IS NULL or not parseable.
      - name: commits_count
        description: "Always NULL — git commit counts not available in the Team plan API"
      - name: pull_requests_count
        description: >
          Always NULL — pull_requests_count is Enterprise-specific
          (code_pull_request_count). Claude Team PR counts use prs_total_count.
      - name: prs_with_cc_count
        description: >
          prs_with_cc — PRs where Claude Code was active at least once.
          Requires Anthropic GitHub-app to be connected; NULL / 0 on orgs without it.
      - name: prs_total_count
        description: >
          total_prs — total PRs in the measurement window. Denominator for
          prs_with_cc_percentage. ⚠️ May be period-aggregate (cumulative),
          not daily — verify against a tenant with the GitHub-app connected.
      - name: tool_action_breakdown_json
        description: "Always NULL — per-tool-type breakdown not exposed by the web API"
      - name: source
        description: "Always 'claude_team'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['claude_team']
      - name: data_source
        description: "Passed through from bronze (always 'insight_claude_team')"
        tests:
          - not_null
      - name: collected_at
        description: "_airbyte_extracted_at"
        tests:
          - not_null
      - name: _version
        description: "ReplacingMergeTree version — toUnixTimestamp64Milli(_airbyte_extracted_at) per ADR-0001."
        tests:
          - not_null

  - name: claude_team__ai_overage
    description: >
      Bronze → Silver: Claude Team per-seat credit spend vs limit →
      class_ai_overage. Sourced from claude_team_overage_spend
      (/api/organizations/{org}/overage_spend_limits via the claude-team-proxy;
      requires billing:view / Owner on the proxy sessionKey, else empty).
      First contributor to class_ai_overage — DEFINES its 19-column positional
      contract. One row per (tenant, seat, billing month): latest snapshot per
      seat per month. UNITS: used_credits / monthly_credit_limit are already
      cents (USD) — mapped straight to *_cents with NO ×100 (unlike
      claude_team__ai_dev_usage.cost_cents).
    columns:
      - name: insight_tenant_id
        tests:
          - not_null
      - name: source_id
        tests:
          - not_null
      - name: unique_key
        description: "Composite dedup key: tenant-source-account_uuid-YYYY-MM"
        tests:
          - not_null
          - unique
      - name: email
        description: "Seat work email (lowercased) — identity key"
        tests:
          - not_null
      - name: account_id
        description: "claude.ai account_uuid — stable vendor seat id / join anchor"
        tests:
          - not_null
      - name: period_month
        description: "First day of the billing month the snapshot was observed in (UTC)"
        tests:
          - not_null
      - name: tool
        description: "Always 'claude'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['claude']
      - name: seat_tier
        description: "Vendor plan tier (team_standard / team_tier_1 / unassigned / …)"
      - name: currency
        description: "ISO currency of the *_cents amounts — 'USD' for Claude Team (Anthropic bills Team plans in USD)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['USD']
      - name: credit_limit_cents
        description: >
          Monthly credit limit in cents (monthly_credit_limit, already minor
          units). NULL when no limit applies (unassigned seats).
      - name: used_amount_cents
        description: "Credits spent this period in cents (used_credits, already minor units)"
        tests:
          - not_null
      - name: overage_cents
        description: "max(0, used_amount_cents - credit_limit_cents). NULL when limit unknown (honest-NULL)"
      - name: is_over_limit
        description: "1 when used > limit (soft overage). NULL when limit unknown"
      - name: is_enabled
        description: "Whether overage/extra-usage is enabled for the seat"
      - name: overage_metrics_json
        description: "Raw vendor extras: limit_type, used_credits_basis, out_of_credits, seat_tier"
      - name: source
        description: "Always 'claude_team'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['claude_team']
      - name: data_source
        description: "Passed through from bronze (always 'insight_claude_team')"
        tests:
          - not_null
      - name: collected_at
        description: "_airbyte_extracted_at"
        tests:
          - not_null
      - name: _version
        description: "ReplacingMergeTree version — toUnixTimestamp64Milli(_airbyte_extracted_at)"
        tests:
          - not_null
