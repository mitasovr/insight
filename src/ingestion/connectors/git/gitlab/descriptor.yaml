name: gitlab
version: "1.0.0"
type: cdk
schedule: "0 2 * * *"
workflow: sync
images:
  cdk:
    name: source-gitlab-insight
    dockerfile: ./Dockerfile
    context: .
    image: ""
dbt_select: "tag:gitlab+"
connection:
  namespace: "bronze_gitlab"
secret:
  required_fields:
    - gitlab_url
    - gitlab_token
