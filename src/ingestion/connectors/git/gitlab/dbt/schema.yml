version: 2

sources:
  - name: bronze_gitlab
    schema: bronze_gitlab
    tables:
      - name: projects
      - name: branches
      - name: commits
      - name: commit_file_changes
      - name: merge_requests
      - name: merge_request_commits
      - name: merge_request_notes
      - name: merge_request_approvals

models:
  - name: gitlab__repositories
    description: "GitLab projects -> staging, feeds class_git_repositories"

  - name: gitlab__repository_branches
    description: "GitLab branches -> staging, feeds class_git_repository_branches"

  # CONTRACT must match the `class_git_commits` silver contract exactly — name,
  # order and data_type. Enforced by scripts/check_silver_contract_parity.py in
  # CI: you cannot add/reorder/retype a column here without doing the same in the
  # silver contract (and therefore every other connector feeding this class).
  - name: gitlab__commits
    description: "GitLab commits -> staging, feeds class_git_commits"
    config:
      contract:
        enforced: true
    columns:
      - name: tenant_id
        data_type: String
      - name: source_id
        data_type: String
      - name: unique_key
        data_type: String
      - name: project_key
        data_type: String
      - name: repo_slug
        data_type: String
      - name: commit_hash
        data_type: String
      - name: branch
        data_type: String
      - name: author_name
        data_type: String
      - name: author_email
        data_type: String
      - name: committer_name
        data_type: String
      - name: committer_email
        data_type: String
      - name: message
        data_type: String
      - name: date
        data_type: Nullable(DateTime)
      - name: files_changed
        data_type: Int64
      - name: lines_added
        data_type: Int64
      - name: lines_removed
        data_type: Int64
      - name: is_merge_commit
        data_type: UInt8
      - name: data_source
        data_type: String
      - name: _version
        data_type: Int64
      - name: _airbyte_extracted_at
        data_type: DateTime64(3)

  - name: gitlab__file_changes
    description: "GitLab commit file changes -> staging, feeds class_git_file_changes"

  - name: gitlab__pull_requests
    description: "GitLab merge requests -> staging, feeds class_git_pull_requests"

  - name: gitlab__pull_requests_comments
    description: "GitLab merge-request notes (human, non-system) -> staging, feeds class_git_pull_requests_comments"

  - name: gitlab__pull_requests_commits
    description: "GitLab merge-request commits -> staging, feeds class_git_pull_requests_commits"

  - name: gitlab__pull_requests_reviewers
    description: "GitLab merge-request approvals -> staging, feeds class_git_pull_requests_reviewers"
