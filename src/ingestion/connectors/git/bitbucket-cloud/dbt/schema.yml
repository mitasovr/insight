version: 2

sources:
  - name: bronze_bitbucket_cloud
    schema: bronze_bitbucket_cloud
    tables:
      - name: repositories
      - name: branches
      - name: commits
      - name: file_changes
      - name: pull_requests
      - name: pull_request_comments
      - name: pull_request_commits

models:
  - name: bitbucket_cloud__repositories
    description: "Bitbucket Cloud repositories -> staging, feeds class_git_repositories"

  - name: bitbucket_cloud__repository_branches
    description: "Bitbucket Cloud branches -> staging, feeds class_git_repository_branches"

  # CONTRACT: must match the `class_git_commits` silver contract exactly
  # (name + data_type) — that silver model is the source of truth for this
  # class. Enforced by scripts/check_silver_contract_parity.py in CI, so you
  # cannot add/change a column here without updating the silver contract (and
  # therefore every other connector feeding this class).
  - name: bitbucket_cloud__commits
    description: "Bitbucket Cloud commits -> staging, feeds class_git_commits"
    config:
      contract:
        enforced: true
    columns:
      - name: tenant_id
        data_type: String
      - name: source_id
        data_type: String
      - name: unique_key
        data_type: String
      - name: project_key
        data_type: String
      - name: repo_slug
        data_type: String
      - name: commit_hash
        data_type: String
      - name: branch
        data_type: String
      - name: author_name
        data_type: String
      - name: author_email
        data_type: String
      - name: committer_name
        data_type: String
      - name: committer_email
        data_type: String
      - name: message
        data_type: String
      - name: date
        data_type: Nullable(DateTime)
      - name: files_changed
        data_type: Int64
      - name: lines_added
        data_type: Int64
      - name: lines_removed
        data_type: Int64
      - name: is_merge_commit
        data_type: UInt8
      - name: data_source
        data_type: String
      - name: _version
        data_type: Int64
      - name: _airbyte_extracted_at
        data_type: DateTime64(3)

  - name: bitbucket_cloud__file_changes
    description: "Bitbucket Cloud file changes -> staging, feeds class_git_file_changes"

  - name: bitbucket_cloud__pull_requests
    description: "Bitbucket Cloud pull requests -> staging, feeds class_git_pull_requests"

  - name: bitbucket_cloud__pull_requests_reviewers
    description: "Bitbucket Cloud PR reviewers (from participants) -> staging, feeds class_git_pull_requests_reviewers"

  - name: bitbucket_cloud__pull_requests_comments
    description: "Bitbucket Cloud PR comments -> staging, feeds class_git_pull_requests_comments"

  - name: bitbucket_cloud__pull_requests_commits
    description: "Bitbucket Cloud PR commits -> staging, feeds class_git_pull_requests_commits"
