version: 2

sources:
  - name: bronze_github
    # Source freshness (TAF #1322): the newest Airbyte row must be recent,
    # else the sync silently stopped and dashboards go stale with no error.
    freshness:
      warn_after: {count: 36, period: hour}
      error_after: {count: 72, period: hour}
    loaded_at_field: _airbyte_extracted_at
    schema: bronze_github
    tables:
      - name: repositories
      - name: branches
      - name: commits
      - name: file_changes
      - name: pull_requests
      - name: pull_request_reviews
      - name: pull_request_comments
      - name: pull_request_commits

models:
  - name: github__repositories
    description: "GitHub repositories -> staging, feeds class_git_repositories"

  - name: github__repository_branches
    description: "GitHub branches -> staging, feeds class_git_repository_branches"

  # CONTRACT must match the `class_git_commits` silver contract exactly — name,
  # order and data_type. Enforced by scripts/check_silver_contract_parity.py in
  # CI: you cannot add/reorder/retype a column here without doing the same in the
  # silver contract (and therefore every other connector feeding this class).
  - name: github__commits
    description: "GitHub commits -> staging, feeds class_git_commits"
    config:
      contract:
        enforced: true
    columns:
      - name: tenant_id
        data_type: String
      - name: source_id
        data_type: String
      - name: unique_key
        data_type: String
      - name: project_key
        data_type: String
      - name: repo_slug
        data_type: String
      - name: commit_hash
        data_type: String
      - name: branch
        data_type: String
      - name: author_name
        data_type: String
      - name: author_email
        data_type: String
      - name: committer_name
        data_type: String
      - name: committer_email
        data_type: String
      - name: message
        data_type: String
      - name: date
        data_type: Nullable(DateTime)
      - name: files_changed
        data_type: Int64
      - name: lines_added
        data_type: Int64
      - name: lines_removed
        data_type: Int64
      - name: is_merge_commit
        data_type: UInt8
      - name: data_source
        data_type: String
      - name: _version
        data_type: Int64
      - name: _airbyte_extracted_at
        data_type: DateTime64(3)

  - name: github__file_changes
    description: "GitHub file changes (PR + direct push) -> staging, feeds class_git_file_changes"

  - name: github__pull_requests
    description: "GitHub pull requests -> staging, feeds class_git_pull_requests"

  - name: github__pull_requests_reviewers
    description: "GitHub PR reviews -> staging, feeds class_git_pull_requests_reviewers"

  - name: github__pull_requests_comments
    description: "GitHub PR comments -> staging, feeds class_git_pull_requests_comments"

  - name: github__pull_requests_commits
    description: "GitHub PR commits -> staging, feeds class_git_pull_requests_commits"
