name: jira
version: "1.1.1"
schedule: "0 3 * * *"
workflow: sync

# CI build metadata + runtime image refs (ADR-0016). The `images:` block is
# the sole source of truth: CI scans it via dynamic discovery to know what
# to build, and reconcile reads images.enrich.image to pass to the
# tt-enrich-jira-run workflow on each submission. Keys with runtime
# semantics: `cdk` (CDK source image — absent for jira; jira is nocode/
# manifest-based and served by Airbyte's first-party source-jira image),
# `enrich` (jira-enrich Rust sidecar).
images:
  enrich:
    name: insight-jira-enrich
    dockerfile: ./enrich/Dockerfile
    context: ./enrich
    image: "ghcr.io/constructorfabric/insight-jira-enrich:2026.05.22.13.03-5cdda7c"

# Silver routing (class_task_*) is delivered by the task-tracking Silver layer
# package, not by this connector. The pipeline runs the jira-rust path:
# dbt(tag:jira) → tt-enrich-jira-run → dbt(tag:silver,tag:jira+). This
# selector is the third step — only silver models that union jira staging
# (class_task_*), not the full silver layer. See DESIGN §1.1 and §3.2.
dbt_select: "tag:silver,tag:jira+"

connection:
  namespace: bronze_jira
secret:
  required_fields:
    - jira_instance_url
    - jira_email
    - jira_api_token
    - jira_project_keys
