version: 2

models:
  - name: class_support_activity
    description: >
      Unified daily support activity per person across all support vendors
      (Zendesk today). Grain: person_key × date. Sits next to
      class_collab_*_activity for cross-system comparison.

      Aggregation guidance for Gold:
        • Activity counts (updates, public_comments, private_comments, solved)
          are actor-attributed and independent — sum freely. For Zendesk these
          are live: the support_ticket_events (Ticket Audits) stream is shipped
          and feeds zendesk__support_event / zendesk__support_activity. They
          remain honest NULL only for vendors whose Ticket Audits stream is not
          yet wired.
        • csat_good / csat_total are assignee-attributed QUALITY signals, not
          activity — surface as a ratio (Σgood/Σtotal), never added to counts.
    columns:
      - name: unique_key
        tests: [unique, not_null]
      - name: person_key
        description: lower(email) → FK insight.people.
        tests: [not_null]
      - name: data_source
        tests:
          - accepted_values: { values: ['zendesk'] }

  - name: dim_support_agent
    description: Cross-vendor support-agent dimension (agent → person via lower(email)).
    columns:
      - name: unique_key
        tests: [unique, not_null]
      - name: person_key
        tests: [not_null]
      - name: data_source
        tests:
          - accepted_values: { values: ['zendesk'] }

  - name: dim_support_ticket
    description: Cross-vendor ticket dimension (context only — not for attribution).
    columns:
      - name: unique_key
        tests: [unique, not_null]
      - name: data_source
        tests:
          - accepted_values: { values: ['zendesk'] }
