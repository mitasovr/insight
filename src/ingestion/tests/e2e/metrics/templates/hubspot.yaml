# Reusable HubSpot CRM bronze records (owners + deals + the four engagement
# streams). A record is a plain field map; an optional `$ref` inherits from
# another record and sibling keys override it (closest wins). The nested
# `$ref: "#/..."` below stays local to this file.
#
# Each base record lists EVERY schema column so a merged bronze row is complete;
# unused fields default to null. The four `_airbyte_*` CDK columns are included
# (transforms read updatedAt → `_version`, createdAt → metric_date, etc.).
#
# Per the test-composition rule, templates carry ONLY invariant scaffolding:
# the envelope (source_id/tenant_id/_airbyte_*), and the owner identity records
# (id/userId/email — the join keys). Every scenario field that drives an
# assertion (amounts, dates, is_won, activity_type counts, owner attribution)
# is written INLINE in each *.test.yaml via `$ref` + sibling overrides.
#
# Identity wiring (see crm-gold-views.sql):
#   * owner `id`     → deals/activities `properties_hubspot_owner_id`  (owner side; deals + calls)
#   * owner `userId` → `hs_user_id` (toString) ↔ `properties_hs_created_by_user_id` (creator side; emails/meetings/tasks)
#   * person_id      = lower(owner.email); org_unit_id = department of the matching bamboohr employee
#     → the owner email MUST equal the bamboohr workEmail case-insensitively.
templates:
  # ---- owners (→ silver.class_crm_users) -----------------------------------
  hubspot_owner:
    _airbyte_raw_id: "00000000-0000-0000-0000-000000000000"
    _airbyte_extracted_at: "2026-01-05T00:00:00"
    _airbyte_meta: "{}"
    _airbyte_generation_id: 0
    tenant_id: "00000000-0000-0000-0000-000000000000"
    source_id: hubspot-test
    unique_key: null
    id: null
    email: null
    userId: null
    firstName: null
    lastName: null
    archived: false
    createdAt: null
    updatedAt: "2026-01-01T00:00:00"
    archivedAt: null
    collected_at: "2026-01-05T00:00:00"
    data_source: hubspot

