spec_version: 1
description: >
  Metric: cursor_active — IC Bullet AI (…0013), #1440.
  How it's computed (bronze → silver → gold):
    • bronze: Cursor daily per-developer usage report — one row marks a Cursor user
    • silver: deduped to one row per developer/day
    • gold:   an "active" metric — value=1 for the requested person; range_max =
              count of active Cursor members in the team (median is 0 by rule)

  Team (median/range = the person's department):
    alice · bob · carol all active → value 1, median 0, range [0, 3].

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
    - $ref: templates/people.yaml#/templates/bob
    - $ref: templates/people.yaml#/templates/carol
  bronze_cursor.cursor_daily_usage:
    # date 1767571200000 ms = 2026-01-05. isActive defaults to true.
    - $ref: templates/cursor_usage.yaml#/templates/alice
      unique_key: cursor-alice-20260105
      date: 1767571200000
    - $ref: templates/cursor_usage.yaml#/templates/bob
      unique_key: cursor-bob-20260105
      date: 1767571200000
    - $ref: templates/cursor_usage.yaml#/templates/carol
      unique_key: cursor-carol-20260105
      date: 1767571200000

cases:
  - name: cursor_active — IC bullet (1 of 3 active members)
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: ai
            metric_id: 00000000-0000-0000-0001-000000000013
            $top: 50
            $filter: "person_id eq 'alice@example.com' and metric_date ge '2026-01-01' and metric_date le '2026-01-31'"
            $orderby: metric_key
    expect:
      - assert: "status == 200"
      - in: ai
        assert: "result.status == 'ok'"
      - in: ai
        find: { metric_key: cursor_active }
        equal: { value: 1, median: 0, range_min: 0, range_max: 3 }
