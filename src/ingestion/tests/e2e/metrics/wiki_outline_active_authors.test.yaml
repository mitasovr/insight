spec_version: 1
description: >
  Metric: wiki_active_authors (Outline) — IC Bullet Wiki (…0041), #1440.
  How it's computed (bronze → silver → gold):
    • bronze: Outline document snapshots — one row marks a page author
    • silver: deduped to one current row per page, keyed to its author
    • gold:   an "active" metric — value=1 for the requested author; range_max =
              count of active authors in the team (median is 0 by rule)

  Team (median/range = the person's department):
    alice · bob · carol all authored a page → value 1, median 0, range [0, 3].

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
    - $ref: templates/people.yaml#/templates/bob
    - $ref: templates/people.yaml#/templates/carol
  bronze_outline.wiki_pages:
    - $ref: templates/outline_wiki_pages.yaml#/templates/alice
      page_id: pg-alice-1
      unique_key: ol-alice-1
      version_number: 1
      created_at: "2026-01-05T00:00:00Z"
    - $ref: templates/outline_wiki_pages.yaml#/templates/alice   # re-sync dup → active stays 1
      page_id: pg-alice-1
      unique_key: ol-alice-1
      version_number: 1
      created_at: "2026-01-05T00:00:00Z"
    - $ref: templates/outline_wiki_pages.yaml#/templates/bob
      page_id: pg-bob-1
      unique_key: ol-bob-1
      version_number: 1
      created_at: "2026-01-05T00:00:00Z"
    - $ref: templates/outline_wiki_pages.yaml#/templates/carol
      page_id: pg-carol-1
      unique_key: ol-carol-1
      version_number: 1
      created_at: "2026-01-05T00:00:00Z"

cases:
  - name: wiki_active_authors (Outline) — IC bullet (1 of 3 active authors)
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: wiki
            metric_id: 00000000-0000-0000-0001-000000000041
            $top: 50
            $filter: "person_id eq 'alice@example.com' and metric_date ge '2026-01-01' and metric_date le '2026-01-31'"
            $orderby: metric_key
    expect:
      - assert: "status == 200"
      - in: wiki
        assert: "result.status == 'ok'"
      - in: wiki
        find: { metric_key: wiki_active_authors }
        equal: { value: 1, median: 0, range_min: 0, range_max: 3 }
