spec_version: 1
description: >
  codex_lines (Codex AI-accepted lines) — Σ lines_added per person.
  bronze_chatgpt_team.chatgpt_team_codex_user_daily → chatgpt_team__ai_dev_usage
  (tool='codex') → silver class_ai_dev_usage → gold insight.ai_bullet_rows →
  IC Bullet AI (…0013). Sum metric (twin of cc_lines / cursor_lines).

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
    - $ref: templates/people.yaml#/templates/bob
    - $ref: templates/people.yaml#/templates/carol
  bronze_chatgpt_team.chatgpt_team_codex_user_daily:
    - $ref: templates/chatgpt_team_codex.yaml#/templates/alice
      unique_key: codex-alice-20260105
      date: "2026-01-05"
      lines_added: 40
    - $ref: templates/chatgpt_team_codex.yaml#/templates/alice   # re-sync dup → must NOT double
      unique_key: codex-alice-20260105
      date: "2026-01-05"
      lines_added: 40
    - $ref: templates/chatgpt_team_codex.yaml#/templates/bob
      unique_key: codex-bob-20260105
      date: "2026-01-05"
      lines_added: 20
    - $ref: templates/chatgpt_team_codex.yaml#/templates/carol
      unique_key: codex-carol-20260105
      date: "2026-01-05"
      lines_added: 10

cases:
  - name: codex_lines — IC bullet (alice value vs team median, dedup holds)
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: ai
            metric_id: 00000000-0000-0000-0001-000000000013
            $top: 50
            $filter: "person_id eq 'alice@example.com' and metric_date ge '2026-01-01' and metric_date le '2026-01-31'"
            $orderby: metric_key
    expect:
      - assert: "status == 200"
      - in: ai
        assert: "result.status == 'ok'"
      - in: ai
        find: { metric_key: codex_lines }
        equal: { value: 40, median: 20, range_min: 10, range_max: 40 }
