spec_version: 1
description: >
  chatgpt_active (ChatGPT chat — active members) — 1 per active chat member; an
  "active" metric → value=1 for the requested person, range_max = team headcount.
  bronze_chatgpt_team.chatgpt_team_chat_activity → chatgpt_team__ai_assistant_usage
  (tool='chatgpt') → silver class_ai_assistant_usage → gold insight.ai_bullet_rows
  → IC Bullet AI (…0013). Twin of cc_active / codex_active.

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
    - $ref: templates/people.yaml#/templates/bob
    - $ref: templates/people.yaml#/templates/carol
  bronze_chatgpt_team.chatgpt_team_chat_activity:
    # Any active chat row counts; the model emits a row when a counter > 0.
    - $ref: templates/chatgpt_team_chat.yaml#/templates/alice
      unique_key: chat-alice-20260105
      date: "2026-01-05"
      messages: 5
    - $ref: templates/chatgpt_team_chat.yaml#/templates/alice   # re-sync dup → must dedup (active stays 1, not 2)
      unique_key: chat-alice-20260105
      date: "2026-01-05"
      messages: 5
    - $ref: templates/chatgpt_team_chat.yaml#/templates/bob
      unique_key: chat-bob-20260105
      date: "2026-01-05"
      messages: 5
    - $ref: templates/chatgpt_team_chat.yaml#/templates/carol
      unique_key: chat-carol-20260105
      date: "2026-01-05"
      messages: 5

cases:
  - name: chatgpt_active — IC bullet (1 of 3 active members)
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: ai
            metric_id: 00000000-0000-0000-0001-000000000013
            $top: 50
            $filter: "person_id eq 'alice@example.com' and metric_date ge '2026-01-01' and metric_date le '2026-01-31'"
            $orderby: metric_key
    expect:
      - assert: "status == 200"
      - in: ai
        assert: "result.status == 'ok'"
      - in: ai
        find: { metric_key: chatgpt_active }
        equal: { value: 1, median: 0, range_min: 0, range_max: 3 }
