spec_version: 1
description: >
  chatgpt (ChatGPT chat messages) — Σ message_count per person
  (message_count ← messages). bronze_chatgpt_team.chatgpt_team_chat_activity →
  chatgpt_team__ai_assistant_usage (tool='chatgpt') → silver
  class_ai_assistant_usage → gold insight.ai_bullet_rows → IC Bullet AI (…0013).
  Sum metric.

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
    - $ref: templates/people.yaml#/templates/bob
    - $ref: templates/people.yaml#/templates/carol
  bronze_chatgpt_team.chatgpt_team_chat_activity:
    - $ref: templates/chatgpt_team_chat.yaml#/templates/alice
      unique_key: chat-alice-20260105
      date: "2026-01-05"
      messages: 40
    - $ref: templates/chatgpt_team_chat.yaml#/templates/alice   # re-sync dup → must NOT double
      unique_key: chat-alice-20260105
      date: "2026-01-05"
      messages: 40
    - $ref: templates/chatgpt_team_chat.yaml#/templates/bob
      unique_key: chat-bob-20260105
      date: "2026-01-05"
      messages: 20
    - $ref: templates/chatgpt_team_chat.yaml#/templates/carol
      unique_key: chat-carol-20260105
      date: "2026-01-05"
      messages: 10

cases:
  - name: chatgpt — IC bullet (alice value vs team median, dedup holds)
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: ai
            metric_id: 00000000-0000-0000-0001-000000000013
            $top: 50
            $filter: "person_id eq 'alice@example.com' and metric_date ge '2026-01-01' and metric_date le '2026-01-31'"
            $orderby: metric_key
    expect:
      - assert: "status == 200"
      - in: ai
        assert: "result.status == 'ok'"
      - in: ai
        find: { metric_key: chatgpt }
        equal: { value: 40, median: 20, range_min: 10, range_max: 40 }
