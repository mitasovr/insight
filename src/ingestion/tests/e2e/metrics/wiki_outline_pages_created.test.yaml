spec_version: 1
description: >
  Metric: wiki_pages_created (Outline) — IC Bullet Wiki (…0041), #1440.
  How it's computed (bronze → silver → gold):
    • bronze: Outline document snapshots — one row per page (author, version, space)
    • silver: deduped to one current row per page, keyed to its author
    • gold:   metric = count of pages the person authored in the window (1 per page)

  Team (median/range = the person's department):
    alice 3 pages · bob 2 · carol 1 (one alice page re-synced → must not double)
    → median 2, range [1, 3].

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
    - $ref: templates/people.yaml#/templates/bob
    - $ref: templates/people.yaml#/templates/carol
  bronze_outline.wiki_pages:
    - $ref: templates/outline_wiki_pages.yaml#/templates/alice
      page_id: pg-alice-1
      unique_key: ol-alice-1
      version_number: 1
      created_at: "2026-01-05T00:00:00Z"
    - $ref: templates/outline_wiki_pages.yaml#/templates/alice   # re-sync dup → must NOT double
      page_id: pg-alice-1
      unique_key: ol-alice-1
      version_number: 1
      created_at: "2026-01-05T00:00:00Z"
    - $ref: templates/outline_wiki_pages.yaml#/templates/alice
      page_id: pg-alice-2
      unique_key: ol-alice-2
      version_number: 1
      created_at: "2026-01-06T00:00:00Z"
    - $ref: templates/outline_wiki_pages.yaml#/templates/alice
      page_id: pg-alice-3
      unique_key: ol-alice-3
      version_number: 1
      created_at: "2026-01-07T00:00:00Z"
    - $ref: templates/outline_wiki_pages.yaml#/templates/bob
      page_id: pg-bob-1
      unique_key: ol-bob-1
      version_number: 1
      created_at: "2026-01-05T00:00:00Z"
    - $ref: templates/outline_wiki_pages.yaml#/templates/bob
      page_id: pg-bob-2
      unique_key: ol-bob-2
      version_number: 1
      created_at: "2026-01-06T00:00:00Z"
    - $ref: templates/outline_wiki_pages.yaml#/templates/carol
      page_id: pg-carol-1
      unique_key: ol-carol-1
      version_number: 1
      created_at: "2026-01-05T00:00:00Z"

cases:
  - name: wiki_pages_created (Outline) — IC bullet (alice 3 vs team median, dedup holds)
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: wiki
            metric_id: 00000000-0000-0000-0001-000000000041
            $top: 50
            $filter: "person_id eq 'alice@example.com' and metric_date ge '2026-01-01' and metric_date le '2026-01-31'"
            $orderby: metric_key
    expect:
      - assert: "status == 200"
      - in: wiki
        assert: "result.status == 'ok'"
      - in: wiki
        find: { metric_key: wiki_pages_created }
        equal: { value: 3, median: 2, range_min: 1, range_max: 3 }
