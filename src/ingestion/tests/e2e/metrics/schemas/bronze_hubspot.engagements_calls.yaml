# Reusable JSON schema for bronze_hubspot.engagements_calls (the columns the
# `calls` arm of hubspot__crm_activities reads). Calls are attributed to the
# record OWNER (properties_hubspot_owner_id) — HubSpot never sets a creator on
# call records. timestamp falls back hs_timestamp → createdAt → epoch.
schemas:
  bronze_hubspot.engagements_calls:
    $schema: http://json-schema.org/draft-07/schema#
    type: object
    additionalProperties: false
    properties:
      _airbyte_raw_id: { type: string }
      _airbyte_extracted_at: { type: string }
      _airbyte_meta: { type: string }
      _airbyte_generation_id: { type: integer }
      tenant_id: { type: [string, "null"] }
      source_id: { type: [string, "null"] }
      unique_key: { type: [string, "null"] }
      id: { type: [string, "null"] }
      archived: { type: [boolean, "null"] }
      createdAt: { type: [string, "null"] }
      updatedAt: { type: [string, "null"] }
      archivedAt: { type: [string, "null"] }
      collected_at: { type: [string, "null"] }
      data_source: { type: [string, "null"] }
      associations_contacts: { type: [string, "null"] }
      associations_deals: { type: [string, "null"] }
      associations_companies: { type: [string, "null"] }
      properties_hubspot_owner_id: { type: [string, "null"] }
      properties_hs_created_by_user_id: { type: [string, "null"] }
      properties_hs_timestamp: { type: [string, "null"] }
      properties_hs_call_duration: { type: [string, "null"] }
      properties_hs_call_disposition: { type: [string, "null"] }
      properties_hs_call_title: { type: [string, "null"] }
      properties_hs_call_direction: { type: [string, "null"] }
