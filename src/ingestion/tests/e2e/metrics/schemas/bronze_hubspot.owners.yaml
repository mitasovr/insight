# Reusable JSON schema for bronze_hubspot.owners (the columns hubspot__crm_users
# reads). `userId` is Nullable(Int64) (HubSpot Owners `userId`) — dbt casts it to
# String for `hs_user_id`. `id` is the owner record id used as `user_id`.
schemas:
  bronze_hubspot.owners:
    $schema: http://json-schema.org/draft-07/schema#
    type: object
    additionalProperties: false
    properties:
      _airbyte_raw_id: { type: string }
      _airbyte_extracted_at: { type: string }
      _airbyte_meta: { type: string }
      _airbyte_generation_id: { type: integer }
      tenant_id: { type: [string, "null"] }
      source_id: { type: [string, "null"] }
      unique_key: { type: [string, "null"] }
      id: { type: [string, "null"] }
      email: { type: [string, "null"] }
      userId: { type: [integer, "null"] }
      firstName: { type: [string, "null"] }
      lastName: { type: [string, "null"] }
      archived: { type: [boolean, "null"] }
      createdAt: { type: [string, "null"] }
      updatedAt: { type: [string, "null"] }
      archivedAt: { type: [string, "null"] }
      collected_at: { type: [string, "null"] }
      data_source: { type: [string, "null"] }
