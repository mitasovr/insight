spec_version: 1
description: >
  Metric: crm_kpis — CRM KPIs hero strip (…0020), sales-rep dashboard.
  How it's computed (bronze → silver → gold):
    • bronze: HubSpot deals (owner_id, createdAt, closedate, amount_home, is_closed/is_won)
              + engagements (calls/emails/meetings/tasks) + owners (id/userId/email)
    • silver: deals/activities/users deduped (ReplacingMergeTree) to one row per record;
              owner email → person_id = lower(email)
    • gold:   per (person, day) — deals_opened = deals created; deals_closed/deals_won =
              deals with close_date in period (won = is_won); deals_value_closed =
              round(Σ amount_home of WON deals); comms_count = all engagements attributed
              to the rep (calls via owner, emails/meetings/tasks via creator).
              query_ref sums each over the period and groups by person_id.

  Single rep (alice). 5 deals: 2 won (10k + 30k), 1 lost-but-closed, 2 still open.
  6 engagements (2 calls, 2 emails, 1 meeting, 1 task) → comms_count 6.
  Cases: alice period sums — opened 5, closed 3, won 2, value 40000, comms 6;
         a duplicate deal re-sync must dedup (counts unchanged).

bronze:
  # people → silver.class_people (org_unit_id from department; not asserted here,
  # but the owner email must match workEmail for identity to resolve).
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
      department: Sales

  bronze_hubspot.owners:
    - $ref: templates/hubspot.yaml#/templates/alice_owner

  bronze_hubspot.deals:
    # A1 won — created 01-05, closed-won 01-10, 10000
    - $ref: templates/hubspot.yaml#/templates/hubspot_deal
      id: deal-a1
      unique_key: hubspot-deal-a1
      properties_hubspot_owner_id: own-alice
      createdAt: "2026-01-05T09:00:00"
      properties_closedate: "2026-01-10T00:00:00Z"
      properties_amount_in_home_currency: "10000"
      properties_hs_is_closed: "true"
      properties_hs_is_closed_won: "true"
    # A1 duplicate (Airbyte re-sync) — same unique_key + updatedAt → must dedup
    - $ref: templates/hubspot.yaml#/templates/hubspot_deal
      id: deal-a1
      unique_key: hubspot-deal-a1
      properties_hubspot_owner_id: own-alice
      createdAt: "2026-01-05T09:00:00"
      properties_closedate: "2026-01-10T00:00:00Z"
      properties_amount_in_home_currency: "10000"
      properties_hs_is_closed: "true"
      properties_hs_is_closed_won: "true"
    # A2 won — created 01-06, closed-won 01-20, 30000
    - $ref: templates/hubspot.yaml#/templates/hubspot_deal
      id: deal-a2
      unique_key: hubspot-deal-a2
      properties_hubspot_owner_id: own-alice
      createdAt: "2026-01-06T09:00:00"
      properties_closedate: "2026-01-20T00:00:00Z"
      properties_amount_in_home_currency: "30000"
      properties_hs_is_closed: "true"
      properties_hs_is_closed_won: "true"
    # A3 lost-but-closed — created 01-07, closed 01-15 (counts as closed, not won)
    - $ref: templates/hubspot.yaml#/templates/hubspot_deal
      id: deal-a3
      unique_key: hubspot-deal-a3
      properties_hubspot_owner_id: own-alice
      createdAt: "2026-01-07T09:00:00"
      properties_closedate: "2026-01-15T00:00:00Z"
      properties_amount_in_home_currency: "5000"
      properties_hs_is_closed: "true"
      properties_hs_is_closed_won: "false"
    # A4 open — created 01-08 (counts as opened only)
    - $ref: templates/hubspot.yaml#/templates/hubspot_deal
      id: deal-a4
      unique_key: hubspot-deal-a4
      properties_hubspot_owner_id: own-alice
      createdAt: "2026-01-08T09:00:00"
      properties_amount_in_home_currency: "20000"
      properties_hs_is_closed: "false"
      properties_hs_is_closed_won: "false"
    # A5 open — created 01-09
    - $ref: templates/hubspot.yaml#/templates/hubspot_deal
      id: deal-a5
      unique_key: hubspot-deal-a5
      properties_hubspot_owner_id: own-alice
      createdAt: "2026-01-09T09:00:00"
      properties_amount_in_home_currency: "50000"
      properties_hs_is_closed: "false"
      properties_hs_is_closed_won: "false"

  # 2 calls (attributed via OWNER) + 2 emails + 1 meeting + 1 task (via CREATOR) = comms 6
  bronze_hubspot.engagements_calls:
    - $ref: templates/hubspot.yaml#/templates/hubspot_call
      id: call-a1
      unique_key: hubspot-call-a1
      properties_hubspot_owner_id: own-alice
      properties_hs_timestamp: "2026-01-12T10:00:00Z"
    - $ref: templates/hubspot.yaml#/templates/hubspot_call
      id: call-a2
      unique_key: hubspot-call-a2
      properties_hubspot_owner_id: own-alice
      properties_hs_timestamp: "2026-01-13T10:00:00Z"
  # emails/meetings/tasks attribute via CREATOR, but silver requires a non-null
  # record owner (owner_id) too — set both to alice (a rep owns + logs her own work).
  bronze_hubspot.engagements_emails:
    - $ref: templates/hubspot.yaml#/templates/hubspot_email
      id: email-a1
      unique_key: hubspot-email-a1
      properties_hubspot_owner_id: own-alice
      properties_hs_created_by_user_id: "101"
      properties_hs_timestamp: "2026-01-12T11:00:00Z"
    - $ref: templates/hubspot.yaml#/templates/hubspot_email
      id: email-a2
      unique_key: hubspot-email-a2
      properties_hubspot_owner_id: own-alice
      properties_hs_created_by_user_id: "101"
      properties_hs_timestamp: "2026-01-13T11:00:00Z"
  bronze_hubspot.engagements_meetings:
    - $ref: templates/hubspot.yaml#/templates/hubspot_meeting
      id: meeting-a1
      unique_key: hubspot-meeting-a1
      properties_hubspot_owner_id: own-alice
      properties_hs_created_by_user_id: "101"
      properties_hs_timestamp: "2026-01-14T11:00:00Z"
  bronze_hubspot.engagements_tasks:
    - $ref: templates/hubspot.yaml#/templates/hubspot_task
      id: task-a1
      unique_key: hubspot-task-a1
      properties_hubspot_owner_id: own-alice
      properties_hs_created_by_user_id: "101"
      properties_hs_timestamp: "2026-01-15T11:00:00Z"

cases:
  - name: "crm_kpis — alice period rollup (opened 5, closed 3, won 2, value 40000, comms 6)"
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: crm
            metric_id: 00000000-0000-0000-0001-000000000020
            $filter: "person_id eq 'alice@example.com' and metric_date ge '2026-01-01' and metric_date le '2026-01-31'"
    expect:
      - assert: "status == 200"
      - in: crm
        assert: "result.status == 'ok'"
      # deals_*/comms_count are UInt64 → JSONEachRow quotes them as strings; cast with int().
      # deals_value_closed is round(Float64) → a JSON number.
      - in: crm
        find: { person_id: alice@example.com }
        assert: >
          int(it.deals_opened) == 5 && int(it.deals_closed) == 3 &&
          int(it.deals_won) == 2 && int(it.comms_count) == 6 &&
          double(it.deals_value_closed) == 40000.0
      - in: crm
        assert: "size(items) == 1"
