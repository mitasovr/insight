spec_version: 1
description: >
  Metric: crm_chart_flow — weekly deal-flow chart (…0021), sales-rep dashboard.
  How it's computed (bronze → silver → gold):
    • bronze: HubSpot deals (owner_id, createdAt, closedate, is_closed/is_won)
    • silver: deals deduped to one row per record; owner email → person_id
    • gold:   per ISO week (toMonday) per rep — opened = deals created that week;
              closed = deals with close_date that week; won = closed deals with is_won.
              metric_date = the Monday (string 'YYYY-MM-DD'); date_bucket = '%b %d'.

  Single rep (alice). 4 deals spread over 3 weeks (Mondays Jan 5 / 12 / 19):
    wk Jan 5  — C1 created+won that week
    wk Jan 12 — C2 created+won, C3 created (open)
    wk Jan 19 — C4 created, closed-LOST (won 0)
  Cases: one per week — proves the weekly bucketing and that a lost deal counts
         as closed but not won.

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
      department: Sales

  bronze_hubspot.owners:
    - $ref: templates/hubspot.yaml#/templates/alice_owner

  bronze_hubspot.deals:
    # C1 — wk Jan 5: created 01-06, closed-won 01-08
    - $ref: templates/hubspot.yaml#/templates/hubspot_deal
      id: deal-c1
      unique_key: hubspot-deal-c1
      properties_hubspot_owner_id: own-alice
      createdAt: "2026-01-06T09:00:00"
      properties_closedate: "2026-01-08T00:00:00Z"
      properties_amount_in_home_currency: "10000"
      properties_hs_is_closed: "true"
      properties_hs_is_closed_won: "true"
    # C2 — wk Jan 12: created 01-13, closed-won 01-14
    - $ref: templates/hubspot.yaml#/templates/hubspot_deal
      id: deal-c2
      unique_key: hubspot-deal-c2
      properties_hubspot_owner_id: own-alice
      createdAt: "2026-01-13T09:00:00"
      properties_closedate: "2026-01-14T00:00:00Z"
      properties_amount_in_home_currency: "20000"
      properties_hs_is_closed: "true"
      properties_hs_is_closed_won: "true"
    # C3 — wk Jan 12: created 01-13, still open (opened only)
    - $ref: templates/hubspot.yaml#/templates/hubspot_deal
      id: deal-c3
      unique_key: hubspot-deal-c3
      properties_hubspot_owner_id: own-alice
      createdAt: "2026-01-13T15:00:00"
      properties_hs_is_closed: "false"
      properties_hs_is_closed_won: "false"
    # C4 — wk Jan 19: created 01-20, closed-LOST 01-22 (closed 1, won 0)
    - $ref: templates/hubspot.yaml#/templates/hubspot_deal
      id: deal-c4
      unique_key: hubspot-deal-c4
      properties_hubspot_owner_id: own-alice
      createdAt: "2026-01-20T09:00:00"
      properties_closedate: "2026-01-22T00:00:00Z"
      properties_hs_is_closed: "true"
      properties_hs_is_closed_won: "false"

cases:
  - name: "crm_chart_flow — week of Jan 5 (opened 1, closed 1, won 1)"
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: crm
            metric_id: 00000000-0000-0000-0001-000000000021
            $filter: "person_id eq 'alice@example.com' and metric_date ge '2026-01-01' and metric_date le '2026-01-31'"
    expect:
      - assert: "status == 200"
      - in: crm
        assert: "result.status == 'ok'"
      # opened/closed/won are UInt64 → JSONEachRow quotes them as strings; cast with int().
      - in: crm
        find: { metric_date: "2026-01-05" }
        assert: "it.date_bucket == 'Jan 05' && int(it.opened) == 1 && int(it.closed) == 1 && int(it.won) == 1"
  - name: "crm_chart_flow — week of Jan 12 (opened 2, closed 1, won 1)"
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: crm
            metric_id: 00000000-0000-0000-0001-000000000021
            $filter: "person_id eq 'alice@example.com' and metric_date ge '2026-01-01' and metric_date le '2026-01-31'"
    expect:
      - in: crm
        find: { metric_date: "2026-01-12" }
        assert: "it.date_bucket == 'Jan 12' && int(it.opened) == 2 && int(it.closed) == 1 && int(it.won) == 1"
  - name: "crm_chart_flow — week of Jan 19 (opened 1, closed 1, won 0 — lost deal)"
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: crm
            metric_id: 00000000-0000-0000-0001-000000000021
            $filter: "person_id eq 'alice@example.com' and metric_date ge '2026-01-01' and metric_date le '2026-01-31'"
    expect:
      - in: crm
        find: { metric_date: "2026-01-19" }
        assert: "it.date_bucket == 'Jan 19' && int(it.opened) == 1 && int(it.closed) == 1 && int(it.won) == 0"
