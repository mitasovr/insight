      id: call-aa1
      unique_key: hubspot-call-aa1
      properties_hubspot_owner_id: own-alice
      properties_hs_timestamp: "2026-01-12T09:00:00Z"
    - $ref: templates/hubspot.yaml#/templates/hubspot_call
      id: call-aa2
