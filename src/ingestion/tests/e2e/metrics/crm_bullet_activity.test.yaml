      properties_hubspot_owner_id: own-carol
      properties_hs_created_by_user_id: "103"
      properties_hs_timestamp: "2026-01-13T11:00:00Z"

  # meetings — attributed via CREATOR. alice 2, bob 1, carol 3.
  bronze_hubspot.engagements_meetings:
    - $ref: templates/hubspot.yaml#/templates/hubspot_meeting
      id: meeting-aa1
      unique_key: hubspot-meeting-aa1
      properties_hubspot_owner_id: own-alice
      properties_hs_created_by_user_id: "101"
      properties_hs_timestamp: "2026-01-14T09:00:00Z"
    - $ref: templates/hubspot.yaml#/templates/hubspot_meeting
      id: meeting-aa2
      unique_key: hubspot-meeting-aa2
      properties_hubspot_owner_id: own-alice
      properties_hs_created_by_user_id: "101"
      properties_hs_timestamp: "2026-01-14T10:00:00Z"
    - $ref: templates/hubspot.yaml#/templates/hubspot_meeting
      id: meeting-ba1
