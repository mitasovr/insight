spec_version: 1
description: >
  Metric: crm_bullet_activity — outreach-activity bullets (…0023), sales-rep dashboard.
  Emits four keys: calls, emails, meetings, comms_per_won.
  How it's computed (bronze → silver → gold):
    • bronze: HubSpot engagements (calls/emails/meetings/tasks) + won deals
    • silver: activities/deals deduped; owner email → person_id; department → org_unit_id
    • gold:   insight.crm_bullet_rows emits one row per engagement (calls via OWNER,
              emails/meetings/tasks via CREATOR) + one deals_won row per won deal.
              query_ref re-aggregates per person → calls/emails/meetings = counts,
              comms_per_won = (calls+emails+meetings+tasks)/deals_won. value = the
              requested rep; median/min/max = the rep's department team.

  Team = department "Sales" {alice, bob, carol} (odd team → unambiguous median):
    calls         alice 2 · bob 1 · carol 3 → median 2, range [1, 3]
    emails        alice 2 · bob 1 · carol 3 → median 2, range [1, 3]
    meetings      alice 2 · bob 1 · carol 3 → median 2, range [1, 3]
    comms_per_won alice 4 ((2+2+2+2)/2 won) · bob 3 ((1+1+1+0)/1) · carol 9 ((3+3+3+0)/1)
                  → median 4, range [3, 9]
  Tasks feed comms_per_won only (not a bullet key). Cases: alice's value + the
  department median/range for each of the four keys.

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
      department: Sales
    - $ref: templates/people.yaml#/templates/bob
      department: Sales
    - $ref: templates/people.yaml#/templates/carol
      department: Sales

  bronze_hubspot.owners:
    - $ref: templates/hubspot.yaml#/templates/alice_owner
    - $ref: templates/hubspot.yaml#/templates/bob_owner
    - $ref: templates/hubspot.yaml#/templates/carol_owner

  # Won deals → deals_won denominator for comms_per_won (alice 2, bob 1, carol 1).
  bronze_hubspot.deals:
    - $ref: templates/hubspot.yaml#/templates/hubspot_deal
      id: deal-aw1
      unique_key: hubspot-deal-aw1
      properties_hubspot_owner_id: own-alice
      createdAt: "2026-01-05T09:00:00"
      properties_closedate: "2026-01-10T00:00:00Z"
      properties_amount_in_home_currency: "10000"
      properties_hs_is_closed: "true"
      properties_hs_is_closed_won: "true"
    - $ref: templates/hubspot.yaml#/templates/hubspot_deal
