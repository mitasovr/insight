spec_version: 1
description: >
  Metric: cursor_completions — IC Bullet AI (…0013), #1440.
  How it's computed (bronze → silver → gold):
    • bronze: Cursor daily per-developer usage report (tab completions accepted)
    • silver: deduped to one row per developer/day carrying the accepted-completions count
    • gold:   metric = sum of accepted tab-completions over the window

  Team (median/range = the person's department):
    alice 50 · bob 20 · carol 10 → median 20, range [10, 50].

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
    - $ref: templates/people.yaml#/templates/bob
    - $ref: templates/people.yaml#/templates/carol
  bronze_cursor.cursor_daily_usage:
    # date 1767571200000 ms = 2026-01-05.
    - $ref: templates/cursor_usage.yaml#/templates/alice
      unique_key: cursor-alice-20260105
      date: 1767571200000
      totalTabsAccepted: 50
    - $ref: templates/cursor_usage.yaml#/templates/alice   # re-sync dup → must NOT double
      unique_key: cursor-alice-20260105
      date: 1767571200000
      totalTabsAccepted: 50
    - $ref: templates/cursor_usage.yaml#/templates/bob
      unique_key: cursor-bob-20260105
      date: 1767571200000
      totalTabsAccepted: 20
    - $ref: templates/cursor_usage.yaml#/templates/carol
      unique_key: cursor-carol-20260105
      date: 1767571200000
      totalTabsAccepted: 10

cases:
  - name: cursor_completions — IC bullet (alice value vs team median, dedup holds)
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: ai
            metric_id: 00000000-0000-0000-0001-000000000013
            $top: 50
            $filter: "person_id eq 'alice@example.com' and metric_date ge '2026-01-01' and metric_date le '2026-01-31'"
            $orderby: metric_key
    expect:
      - assert: "status == 200"
      - in: ai
        assert: "result.status == 'ok'"
      - in: ai
        find: { metric_key: cursor_completions }
        equal: { value: 50, median: 20, range_min: 10, range_max: 50 }
