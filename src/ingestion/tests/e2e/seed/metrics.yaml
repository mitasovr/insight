# Test-specific metric overrides.
#
# Inserted into MariaDB.metrics AFTER the analytics-api binary's SeaORM
# auto-migrations seed prod metrics. Use these for fixtures that need a
# narrow metric not in the prod catalog (e.g. a direct read of insight.people
# without the heavier joins of "Team Members").
#
# Each row is inserted under config.TEST_TENANT_ID — the tenant the harness
# sends as X-Insight-Tenant-Id on every request (the analytics-api tenant
# middleware rejects nil/absent tenants, see e2e_lib/metric_seed.py).

overrides: []
  # Example (uncomment & adapt for a fixture needing a metric not in the prod catalog):
  # - id: 00000000-0000-0000-0000-0000face0001
  #   name: Smoke — insight.people direct
  #   description: Reads insight.people directly, no joins.
  #   query_ref: SELECT person_id, display_name, job_title, status FROM insight.people
  #   is_enabled: true
