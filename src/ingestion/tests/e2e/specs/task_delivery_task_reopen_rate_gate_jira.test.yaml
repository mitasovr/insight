spec_version: 1
description: >
  Task Delivery · task_reopen_rate · JIRA — the <5-closes GATE branch (NULL).

  Metric: task_reopen_rate — IC Bullet Task Delivery (…0011). The companion spec
  (task_delivery_task_reopen_rate_jira) proves the rate value at the gate boundary
  (5 closes). THIS spec proves the suppression branch: with FEWER than 5 closes the
  …0011 query_ref returns NULL, even though reopens exist — so a small, noisy
  sample never shows a rate.

  How it's computed (bronze → silver → gold): close/reopen status transitions →
  per-day +close / +reopen event counts → query_ref gates on Σcloses ≥ 5 and emits
  NULL below that.

  All drivers inline; templates only carry invariant scaffolding. Two issues for
  ALICE (created 2026-01-05, issuetype Task), giving 3 closes (< 5) and 1 reopen:
    RG-1 — In Progress → Closed                          → 1 close
    RG-2 — In Progress → Closed → In Progress → Closed   → 2 closes, 1 reopen
  Σcloses = 3 (< 5) → gate fails → task_reopen_rate = NULL (not 100·1/3).

  Only `value` is asserted (cohort median/range depend on unseeded HR org_unit).

bronze:
  bronze_jira.jira_issue:
    - $ref: templates/jira_task.yaml#/templates/jira_issue
      id: RG-1
      jira_id: RG-1
      unique_key: jira-test-RG-1
      id_readable: TSG-1
      created: "2026-01-05T09:00:00"
      custom_fields_json: '{"status":{"id":"6","name":"Closed"},"issuetype":{"id":"10001","name":"Task"},"assignee":{"accountId":"alice-jira-acct","displayName":"Alice Alpha"}}'
    - $ref: templates/jira_task.yaml#/templates/jira_issue
      id: RG-2
      jira_id: RG-2
      unique_key: jira-test-RG-2
      id_readable: TSG-2
      created: "2026-01-05T09:00:00"
      custom_fields_json: '{"status":{"id":"6","name":"Closed"},"issuetype":{"id":"10001","name":"Task"},"assignee":{"accountId":"alice-jira-acct","displayName":"Alice Alpha"}}'
  bronze_jira.jira_issue_history:
    # RG-1: single close.
    - $ref: templates/jira_task.yaml#/templates/jira_history
      id_readable: TSG-1
      changelog_id: "48001"
      unique_key: jira-test-TSG-1-48001
      created_at: "2026-01-08T09:00:00.000+0000"
      items: '[{"field":"Status","fieldId":"status","fromString":"In Progress","from":"3","toString":"Closed","to":"6"}]'
    # RG-2: close 01-08, reopen 01-12, close again 01-16 → 2 closes, 1 reopen.
    - $ref: templates/jira_task.yaml#/templates/jira_history
      id_readable: TSG-2
      changelog_id: "48002"
      unique_key: jira-test-TSG-2-48002
      created_at: "2026-01-08T09:00:00.000+0000"
      items: '[{"field":"Status","fieldId":"status","fromString":"In Progress","from":"3","toString":"Closed","to":"6"}]'
    - $ref: templates/jira_task.yaml#/templates/jira_history
      id_readable: TSG-2
      changelog_id: "48003"
      unique_key: jira-test-TSG-2-48003
      created_at: "2026-01-12T09:00:00.000+0000"
      items: '[{"field":"Status","fieldId":"status","fromString":"Closed","from":"6","toString":"In Progress","to":"3"}]'
    - $ref: templates/jira_task.yaml#/templates/jira_history
      id_readable: TSG-2
      changelog_id: "48004"
      unique_key: jira-test-TSG-2-48004
      created_at: "2026-01-16T09:00:00.000+0000"
      items: '[{"field":"Status","fieldId":"status","fromString":"In Progress","from":"3","toString":"Closed","to":"6"}]'
  bronze_jira.jira_fields:
    - $ref: templates/jira_task.yaml#/templates/field_status
    - $ref: templates/jira_task.yaml#/templates/field_assignee
    - $ref: templates/jira_task.yaml#/templates/field_issuetype
  bronze_jira.jira_user:
    - $ref: templates/jira_task.yaml#/templates/alice_user

cases:
  # 3 closes (< 5) → gate suppresses the rate → value is NULL.
  - name: task_reopen_rate — gate below 5 closes suppresses to null (alice 3 closes)
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: task_delivery
            metric_id: 00000000-0000-0000-0001-000000000011
            $top: 50
            $filter: "person_id eq 'alice@example.com' and metric_date ge '2026-01-01' and metric_date le '2026-01-31'"
            $orderby: metric_key
    expect:
      - assert: "status == 200"
      - in: task_delivery
        assert: "result.status == 'ok'"
      - in: task_delivery
        find: { metric_key: task_reopen_rate }
        equal: { value: null }
