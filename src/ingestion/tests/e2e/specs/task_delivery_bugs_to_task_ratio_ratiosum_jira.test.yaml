spec_version: 1
description: >
  Task Delivery · bugs_to_task_ratio · JIRA — RATIO-OF-SUMS correctness guard.

  Metric: bugs_to_task_ratio — IC Bullet Task Delivery (…0011). This spec exists
  specifically to pin the period aggregation as 100·Σbugs/Σtasks (issue #433 §3.3),
  NOT the average of per-day ratios. The two are equal only when every day has the
  same task count, so this fixture uses TWO days with DIFFERENT task counts:

    2026-01-10  4 tasks closed, 1 of them a Bug   → daily ratio 25%
    2026-01-20  1 task  closed, it is a Bug       → daily ratio 100%

  • avg-of-daily-ratios = (25 + 100) / 2 = 62.5   (the WRONG, biased definition)
  • ratio-of-sums       = 100 · Σbugs/Σtasks = 100 · 2/5 = 40.0   (correct)

  Asserting 40.0 fails if the reducer ever regresses to averaging daily ratios.
  How it's computed (bronze → silver → gold): bronze issues with issuetype +
  close-status changelog → per-field event log → per (assignee, close-day) counts
  of tasks_closed and bugs_fixed → the …0011 query_ref sums both across the period
  and divides.

  All drivers inline; templates only carry invariant scaffolding. issuetype lives
  in custom_fields_json; each issue gets one In Progress → Closed changelog landing
  on its close day. Only `value` is asserted (cohort median/range need HR org_unit).

bronze:
  bronze_jira.jira_issue:
    # Day A (close 2026-01-10): 4 tasks, RS-4 is the only Bug.
    - $ref: templates/jira_task.yaml#/templates/jira_issue
      id: RS-1
      jira_id: RS-1
      unique_key: jira-test-RS-1
      id_readable: TSR-1
      created: "2026-01-05T09:00:00"
      custom_fields_json: '{"status":{"id":"6","name":"Closed"},"issuetype":{"id":"10001","name":"Task"},"assignee":{"accountId":"alice-jira-acct","displayName":"Alice Alpha"}}'
    - $ref: templates/jira_task.yaml#/templates/jira_issue
      id: RS-2
      jira_id: RS-2
