[pytest]
testpaths = specs meta
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
markers =
    slow: tests that take > 5s
    smoke: framework smoke tests (under meta/)
    fixture: tests generated from specs/*.test.yaml
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s | %(levelname)-7s | %(name)-20s | %(message)s
log_cli_date_format = %H:%M:%S
