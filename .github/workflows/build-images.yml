name: Build & Push Container Images

on:
  push:
    branches: [main]
    paths:
      - "src/backend/**"
      - "src/ingestion/**"
      - "charts/insight/**"
      - ".github/workflows/build-images.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/backend/**"
      - "src/ingestion/**"
      - "charts/insight/**"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:
    inputs:
      # Cross-repo dispatch hook: cyberfabric/cyber-insight-front's CI sends
      # the just-published frontend image tag here so the umbrella chart
      # bumps the frontend subchart appVersion to match. When set, ALL
      # backend image-build jobs are skipped (the dispatch carries no
      # backend code change), and publish-chart runs to bump + republish.
      # Leave empty for a manual full-rebuild dispatch (legacy behaviour).
      frontend_tag:
        description: "Frontend image tag to pin (e.g. 2026.05.14.10.00-abc1234). Empty = full manual rebuild."
        required: false
        type: string
        default: ""

# One in-flight chart-publish per branch. Prevents two merges from racing
# the auto-commit-back step.
concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/cyberfabric

permissions:
  contents: write   # publish-chart auto-commits Chart.yaml bumps back to main
  packages: write   # publish-chart pushes the umbrella chart to GHCR

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      # Per-service filters so a single-service code change only rebuilds
      # that one image. The Rust services share a Cargo workspace, so a
      # workspace-root Cargo.toml / Cargo.lock change is treated as a
      # cross-cutting trigger for both api-gateway and analytics-api.
      # The .NET identity service is self-contained (no Cargo workspace
      # membership) — only its own folder triggers a rebuild.
      api_gateway:   ${{ steps.filter.outputs.api_gateway }}
      analytics_api: ${{ steps.filter.outputs.analytics_api }}
      identity:      ${{ steps.filter.outputs.identity }}
      toolbox:       ${{ steps.filter.outputs.toolbox }}
      jira_enrich:   ${{ steps.filter.outputs.jira_enrich }}
      umbrella:      ${{ steps.filter.outputs.umbrella }}
      build_tag:     ${{ steps.tag.outputs.build_tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api_gateway:
              - 'src/backend/services/api-gateway/**'
              - 'src/backend/Cargo.toml'
              - 'src/backend/Cargo.lock'
            analytics_api:
              - 'src/backend/services/analytics-api/**'
              - 'src/backend/Cargo.toml'
              - 'src/backend/Cargo.lock'
            identity:
              - 'src/backend/services/identity/**'
            toolbox:
              - 'src/ingestion/**'
            jira_enrich:
              - 'src/ingestion/connectors/task-tracking/jira/enrich/**'
            umbrella:
              - 'charts/insight/**'

      # Compute the canonical build tag once for the whole workflow so every
      # downstream job (image builds + chart publish) tags with the SAME
      # string. metadata-action's {{date}} would otherwise drift by up to a
      # minute across parallel matrix steps, and subchart appVersion bumps
      # would point at images that don't exist.
      - name: Compute build tag
        id: tag
        run: |
          BUILD_TAG="$(date -u +%Y.%m.%d.%H.%M)-$(echo "${GITHUB_SHA}" | cut -c1-7)"
          echo "build_tag=${BUILD_TAG}" >> "$GITHUB_OUTPUT"
          echo "Build tag for this run: ${BUILD_TAG}"

  # Per-service backend builds. Split from a single matrix job so that a
  # change touching only one service rebuilds only that image — and only
  # that subchart's `appVersion` gets bumped downstream. This is what
  # makes per-service granularity actually work in the gitops promotion
  # flow (see publish-chart for the appVersion logic).

  backend-api-gateway:
    needs: changes
    if: |
      needs.changes.outputs.api_gateway == 'true'
      || (github.event_name == 'workflow_dispatch' && inputs.frontend_tag == '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/insight-api-gateway
          tags: |
            type=raw,value=${{ needs.changes.outputs.build_tag }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: src/backend
          file: src/backend/services/api-gateway/Dockerfile
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  backend-analytics-api:
    needs: changes
    if: |
      needs.changes.outputs.analytics_api == 'true'
      || (github.event_name == 'workflow_dispatch' && inputs.frontend_tag == '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/insight-analytics-api
          tags: |
            type=raw,value=${{ needs.changes.outputs.build_tag }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: src/backend
          file: src/backend/services/analytics-api/Dockerfile
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  backend-identity:
    needs: changes
    if: |
      needs.changes.outputs.identity == 'true'
      || (github.event_name == 'workflow_dispatch' && inputs.frontend_tag == '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/insight-identity
          tags: |
            type=raw,value=${{ needs.changes.outputs.build_tag }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
      # .NET 9 identity is self-contained — context is the service folder
      # itself, not src/backend/ (no Cargo workspace membership).
      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: src/backend/services/identity
          file: src/backend/services/identity/Dockerfile
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  toolbox:
    needs: changes
    if: |
      needs.changes.outputs.toolbox == 'true'
      || (github.event_name == 'workflow_dispatch' && inputs.frontend_tag == '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/insight-toolbox
          tags: |
            type=raw,value=${{ needs.changes.outputs.build_tag }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      # Build → validate → push. The build step loads the image into the
      # local Docker daemon so the validate step can `docker run` against it;
      # the push step reuses the buildx cache (essentially free). Without
      # the validate step a broken dbt project (duplicate model name,
      # broken `ref()`, jinja error, schema.yml mismatch) only manifests
      # at first CronWorkflow run in the cluster.
      - name: Build toolbox image (load locally)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: src/ingestion
          file: src/ingestion/tools/toolbox/Dockerfile
          load: true
          push: false
          tags: insight-toolbox:ci-validate
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate dbt project (dbt parse)
        # `dbt parse` exercises the dbt manifest: duplicate model/test
        # names, broken `ref()`/`source()`, jinja syntax errors,
        # schema.yml model patches that don't match a model — all error
        # here. It does NOT execute any SQL against the warehouse: the
        # dummy profile below is never connected, the adapter just
        # needs to be loadable.
        run: |
          mkdir -p /tmp/dbt-ci-profiles
          cat > /tmp/dbt-ci-profiles/profiles.yml <<'YAML'
          ingestion:
            target: ci-parse
            outputs:
              ci-parse:
                type: clickhouse
                host: dummy.local
                port: 8123
                schema: dbt_parse_ci
                user: ci
                password: ci
                secure: false
          YAML
          docker run --rm \
            -v /tmp/dbt-ci-profiles:/profiles:ro \
            -w /ingestion/dbt \
            insight-toolbox:ci-validate \
            dbt parse --profiles-dir /profiles

      - name: Push toolbox image
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: src/ingestion
          file: src/ingestion/tools/toolbox/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

  jira-enrich:
    needs: changes
    if: |
      needs.changes.outputs.jira_enrich == 'true'
      || (github.event_name == 'workflow_dispatch' && inputs.frontend_tag == '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/insight-jira-enrich
          tags: |
            type=raw,value=${{ needs.changes.outputs.build_tag }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: src/ingestion/connectors/task-tracking/jira/enrich
          file: src/ingestion/connectors/task-tracking/jira/enrich/Dockerfile
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Umbrella chart publish ────────────────────────────────────────────────
  # Per merge to main: bump subchart appVersions for whichever services were
  # rebuilt in this run, patch-bump the umbrella version, regenerate
  # Chart.lock, package, push to oci://ghcr.io/cyberfabric/charts/insight,
  # and commit the bumps back to main with [skip ci] so we don't recurse.
  #
  # Runs only on push-to-main (not on PRs) and only when at least one bucket
  # actually rebuilt or the umbrella's own files changed. PR runs validate
  # the workflow itself by passing through changes/build jobs, then stop.
  #
  # See ADR-0001 (docs/components/deployment/specs/ADR/0001-chart-publishing-on-merge.md)
  # and the gitops SPEC §2.4 for the contract.
  publish-chart:
    needs: [changes, backend-api-gateway, backend-analytics-api, backend-identity, toolbox, jira-enrich]
    if: |
      always()
      && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && github.ref == 'refs/heads/main'
      && (needs.backend-api-gateway.result   == 'success' || needs.backend-api-gateway.result   == 'skipped')
      && (needs.backend-analytics-api.result == 'success' || needs.backend-analytics-api.result == 'skipped')
      && (needs.backend-identity.result      == 'success' || needs.backend-identity.result      == 'skipped')
      && (needs.toolbox.result               == 'success' || needs.toolbox.result               == 'skipped')
      && (needs.jira-enrich.result           == 'success' || needs.jira-enrich.result           == 'skipped')
      && (
        needs.changes.outputs.api_gateway   == 'true'
        || needs.changes.outputs.analytics_api == 'true'
        || needs.changes.outputs.identity   == 'true'
        || needs.changes.outputs.toolbox     == 'true'
        || needs.changes.outputs.jira_enrich == 'true'
        || needs.changes.outputs.umbrella    == 'true'
        || inputs.frontend_tag != ''
      )
    runs-on: ubuntu-latest
    steps:
      # Mint a short-lived (1h) installation token from the
      # insight-chart-release-bot GitHub App so the auto-commit push at the
      # end of this job can bypass branch protection on `main`. The App has
      # Contents: read & write on this repo only and is on `main`'s bypass
      # list; default GITHUB_TOKEN cannot bypass, and we explicitly chose
      # App-over-PAT to avoid tying release pushes to a single human.
      # GHCR push (helm registry login below) stays on GITHUB_TOKEN via
      # packages: write — the App was deliberately not granted that scope.
      - name: Mint chart-release App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.INSIGHT_RELEASE_APP_ID }}
          private-key: ${{ secrets.INSIGHT_RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          # Full history needed because we'll commit back to the same branch.
          fetch-depth: 0
          # App token; persists in the git remote so the final `git push`
          # in this job runs as the App and clears `main` branch protection.
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'

      # Per-service subchart appVersion bumps. Each is bumped INDEPENDENTLY,
      # only if the matching image was rebuilt this run. Services whose
      # source didn't change keep their previous appVersion → their image
      # tag in the published chart still resolves to an image that exists.
      # This is what makes per-service granularity work in the deploy path
      # (subchart deployment templates default `image.tag` to
      # `.Chart.AppVersion`, which is the SUBCHART's appVersion, not the
      # umbrella's).
      - name: Bump per-service subchart appVersions
        env:
          BUILD_TAG:     ${{ needs.changes.outputs.build_tag }}
          API_GATEWAY:   ${{ needs.changes.outputs.api_gateway }}
          ANALYTICS_API: ${{ needs.changes.outputs.analytics_api }}
          IDENTITY:      ${{ needs.changes.outputs.identity }}
        run: |
          set -euo pipefail
          if [ "$API_GATEWAY" = "true" ]; then
            echo "Bumping api-gateway subchart appVersion → $BUILD_TAG"
            yq -i ".appVersion = \"$BUILD_TAG\"" src/backend/services/api-gateway/helm/Chart.yaml
          fi
          if [ "$ANALYTICS_API" = "true" ]; then
            echo "Bumping analytics-api subchart appVersion → $BUILD_TAG"
            yq -i ".appVersion = \"$BUILD_TAG\"" src/backend/services/analytics-api/helm/Chart.yaml
          fi
          if [ "$IDENTITY" = "true" ]; then
            echo "Bumping identity subchart appVersion → $BUILD_TAG"
            yq -i ".appVersion = \"$BUILD_TAG\"" src/backend/services/identity/helm/Chart.yaml
          fi

      # Cross-repo frontend bump. The frontend lives in
      # cyberfabric/cyber-insight-front and builds its own image; on
      # publish-to-main its CI dispatches THIS workflow with frontend_tag
      # set to the just-built tag. We mirror that into the frontend
      # subchart's appVersion so the deploy path resolves the right image
      # (subchart deployment templates default image.tag to
      # .Chart.AppVersion, which is the SUBCHART's appVersion).
      - name: Bump frontend subchart appVersion (cross-repo dispatch)
        if: inputs.frontend_tag != ''
        env:
          FRONTEND_TAG: ${{ inputs.frontend_tag }}
        run: |
          set -euo pipefail
          echo "Bumping frontend subchart appVersion → $FRONTEND_TAG"
          yq -i ".appVersion = \"$FRONTEND_TAG\"" src/frontend/helm/Chart.yaml

      - name: Bump ingestion image refs
        env:
          BUILD_TAG: ${{ needs.changes.outputs.build_tag }}
          TOOLBOX: ${{ needs.changes.outputs.toolbox }}
          JIRA_ENRICH: ${{ needs.changes.outputs.jira_enrich }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          set -euo pipefail
          # Ingestion images are pinned in the umbrella values.yaml as full
          # image refs, not as subchart appVersions, because they have no
          # subchart of their own (they run as Argo Workflow steps).
          if [ "$TOOLBOX" = "true" ]; then
            REF="$IMAGE_PREFIX/insight-toolbox:$BUILD_TAG"
            echo "Setting ingestion.toolboxImage → $REF"
            yq -i ".ingestion.toolboxImage = \"$REF\"" charts/insight/values.yaml
          fi
          if [ "$JIRA_ENRICH" = "true" ]; then
            REF="$IMAGE_PREFIX/insight-jira-enrich:$BUILD_TAG"
            echo "Setting ingestion.jiraEnrichImage → $REF"
            yq -i ".ingestion.jiraEnrichImage = \"$REF\"" charts/insight/values.yaml
          fi

      # Umbrella `version` always patch-bumps (semver, per-publish contract).
      # Umbrella `appVersion` is DISPLAY-ONLY in the deploy path — the actual
      # image.tag for each pod is resolved inside that pod's subchart from
      # the SUBCHART's appVersion. We set the umbrella appVersion to the MAX
      # of the three backend subchart appVersions so it summarises "the
      # newest image tag bundled in this chart artifact". `sort -V` handles
      # the YYYY.MM.DD.HH.MM-shortsha format correctly because the date
      # prefix is lexicographically sortable.
      #
      # If no backend subchart advanced this run (e.g. chart-only PR), the
      # max stays at the previous value — the umbrella appVersion never
      # races ahead of an image that doesn't exist.
      - name: Bump umbrella version
        id: umbrella
        run: |
          set -euo pipefail
          CURRENT="$(yq '.version' charts/insight/Chart.yaml)"
          NEXT="$(echo "$CURRENT" | awk -F. '{ printf "%d.%d.%d", $1, $2, $3+1 }')"
          NEW_APP=$(yq -r '.appVersion' \
            src/backend/services/api-gateway/helm/Chart.yaml \
            src/backend/services/analytics-api/helm/Chart.yaml \
            src/backend/services/identity/helm/Chart.yaml \
            src/frontend/helm/Chart.yaml \
            | sort -V | tail -1)
          echo "Umbrella version $CURRENT → $NEXT (appVersion → $NEW_APP)"
          yq -i ".version = \"$NEXT\""        charts/insight/Chart.yaml
          yq -i ".appVersion = \"$NEW_APP\""  charts/insight/Chart.yaml
          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"

      - name: Helm dependency update
        run: helm dependency update charts/insight

      - name: Helm package
        run: |
          mkdir -p dist
          helm package charts/insight -d dist/

      - name: Helm registry login (GHCR)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Helm push
        run: |
          helm push "dist/insight-${{ steps.umbrella.outputs.version }}.tgz" \
            oci://ghcr.io/cyberfabric/charts

      - name: Commit version bumps back to main
        env:
          UMBRELLA_VERSION: ${{ steps.umbrella.outputs.version }}
          BUILD_TAG: ${{ needs.changes.outputs.build_tag }}
        run: |
          set -euo pipefail
          git config user.email "ci@cyberfabric.local"
          git config user.name  "insight-ci"

          git add charts/insight/Chart.yaml \
                  charts/insight/Chart.lock \
                  charts/insight/values.yaml \
                  src/backend/services/api-gateway/helm/Chart.yaml \
                  src/backend/services/analytics-api/helm/Chart.yaml \
                  src/backend/services/identity/helm/Chart.yaml \
                  src/frontend/helm/Chart.yaml

          if git diff --staged --quiet; then
            echo "no version changes to commit"
            exit 0
          fi

          # [skip ci] in the message prevents the push from re-triggering
          # this workflow. paths-filter on the next real merge will diff
          # against THIS commit, so service-file changes are correctly
          # detected on the subsequent run.
          git commit -m "chore(release): umbrella ${UMBRELLA_VERSION} (build ${BUILD_TAG}) [skip ci]"

          # Push, with one rebase-retry to absorb a race against
          # origin/${GITHUB_REF_NAME} advancing between job start and
          # now. The workflow concurrency group narrows but does not
          # eliminate this window — a manual push, an unrelated
          # workflow's push, or a force-push could all advance the
          # branch tip. Mirrors the gitops poller's policy: rebase
          # once, fail loud on second failure.
          if ! git push origin "HEAD:${GITHUB_REF_NAME}"; then
            echo "push failed; rebasing onto refreshed origin/${GITHUB_REF_NAME} and retrying"
            if ! git pull --rebase origin "${GITHUB_REF_NAME}"; then
              echo "rebase failed (conflict on bumped files?); aborting"
              git rebase --abort 2>/dev/null || true
              exit 1
            fi
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
