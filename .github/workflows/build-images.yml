name: Build & Push Container Images

on:
  push:
    branches: [main]
    paths:
      - "src/backend/**"
      - "src/ingestion/**"
      - "charts/insight/**"
      - ".github/workflows/build-images.yml"
      - ".github/workflows/scripts/discover-image-matrix.py"
  pull_request:
    branches: [main]
    paths:
      - "src/backend/**"
      - "src/ingestion/**"
      - "charts/insight/**"
      - ".github/workflows/build-images.yml"
      - ".github/workflows/scripts/discover-image-matrix.py"
  workflow_dispatch:
    inputs:
      # Cross-repo dispatch hook: constructorfabric/insight-front's CI sends
      # the just-published frontend image tag here so the umbrella chart
      # bumps the frontend subchart appVersion to match. When set, ALL
      # backend image-build jobs are skipped (the dispatch carries no
      # backend code change), and publish-chart runs to bump + republish.
      # Leave empty for a manual full-rebuild dispatch (legacy behaviour) —
      # in that mode discover-images emits ALL connector image entries.
      frontend_tag:
        description: "Frontend image tag to pin (e.g. 2026.05.14.10.00-abc1234). Empty = full manual rebuild."
        required: false
        type: string
        default: ""

# One in-flight chart-publish per branch. Prevents two merges from racing
# the auto-commit-back step.
concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/constructorfabric

permissions:
  contents: write   # publish-chart auto-commits Chart.yaml bumps back to main
  packages: write   # publish-chart pushes the umbrella chart to GHCR

jobs:
  # ─── Backend / chart change detection ──────────────────────────────────────
  # Per-service filters so a single-service code change only rebuilds that one
  # image. Connector image builds are NOT handled here — see discover-images,
  # which scans every descriptor.yaml's `images:` block (ADR-0016).
  changes:
    runs-on: ubuntu-latest
    outputs:
      api_gateway:   ${{ steps.filter.outputs.api_gateway }}
      analytics_api: ${{ steps.filter.outputs.analytics_api }}
      identity:      ${{ steps.filter.outputs.identity }}
      toolbox:       ${{ steps.filter.outputs.toolbox }}
      umbrella:      ${{ steps.filter.outputs.umbrella }}
      build_tag:     ${{ steps.tag.outputs.build_tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api_gateway:
              - 'src/backend/services/api-gateway/**'
              - 'src/backend/Cargo.toml'
              - 'src/backend/Cargo.lock'
            analytics_api:
              - 'src/backend/services/analytics-api/**'
              - 'src/backend/Cargo.toml'
              - 'src/backend/Cargo.lock'
            identity:
              - 'src/backend/services/identity/**'
            toolbox:
              - 'src/ingestion/**'
            umbrella:
              - 'charts/insight/**'

      # Compute the canonical build tag once per workflow run so every
      # downstream job (backend builds + matrix connector builds + toolbox +
      # chart publish) tags with the SAME string. metadata-action's {{date}}
      # would otherwise drift by up to a minute across parallel steps, and
      # subchart appVersion bumps would point at images that don't exist.
      - name: Compute build tag
        id: tag
        run: |
          BUILD_TAG="$(date -u +%Y.%m.%d.%H.%M)-$(echo "${GITHUB_SHA}" | cut -c1-7)"
          echo "build_tag=${BUILD_TAG}" >> "$GITHUB_OUTPUT"
          echo "Build tag for this run: ${BUILD_TAG}"

  # ─── Connector image discovery (ADR-0016) ──────────────────────────────────
  # Scan every src/ingestion/connectors/*/*/descriptor.yaml's `images:` map
  # and produce a matrix of {connector_dir, key, name, dockerfile, context,
  # image} entries to build in this run.
  #
  # An entry fires when at least one changed path lives under
  # `<connector_dir>/<context>/` AND is NOT the connector's descriptor.yaml.
  # The descriptor exclusion is the recursion-break: bump-descriptors patches
  # `images.<key>.image` in descriptor.yaml on every successful push without
  # `[skip ci]`, and that push re-triggers this workflow. If the descriptor
  # itself fired image rebuilds, we'd loop forever.
  #
  # `workflow_dispatch` with empty `frontend_tag` (legacy full-rebuild) emits
  # every entry; PR runs use the same path-filter logic as push runs.
  discover-images:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.scan.outputs.matrix }}
      any:    ${{ steps.scan.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need parent commit for the changed-paths diff.
          fetch-depth: 0
      - name: Install PyYAML
        run: python3 -m pip install --quiet pyyaml
      - name: Scan descriptors and filter by changed paths
        id: scan
        env:
          EVENT_BEFORE:       ${{ github.event.before }}
          PR_BASE_SHA:        ${{ github.event.pull_request.base.sha }}
          GITHUB_EVENT_NAME:  ${{ github.event_name }}
          FRONTEND_TAG_INPUT: ${{ inputs.frontend_tag }}
        run: |
          set -euo pipefail
          # Determine base for the changed-paths diff:
          # - push: github.event.before (parent before the push)
          # - pull_request: base sha of the PR
          # - workflow_dispatch: HEAD~1 (single-commit lookback fallback)
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BASE="$PR_BASE_SHA"
          elif [ "$GITHUB_EVENT_NAME" = "push" ] && [ -n "$EVENT_BEFORE" ] \
               && [ "$EVENT_BEFORE" != "0000000000000000000000000000000000000000" ]; then
            BASE="$EVENT_BEFORE"
          else
            BASE="HEAD~1"
          fi

          # Legacy full-rebuild semantics on workflow_dispatch with no
          # frontend_tag: emit every image entry regardless of changed paths.
          ALL_FLAG=""
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ -z "$FRONTEND_TAG_INPUT" ]; then
            ALL_FLAG="--all"
          fi

          if ! git rev-parse "$BASE" >/dev/null 2>&1; then
            echo "WARN: base $BASE not resolvable; treating as no changes (matrix may be empty)" >&2
            : > /tmp/changed.txt
          else
            git diff --name-only "$BASE" "$GITHUB_SHA" > /tmp/changed.txt || true
          fi
          echo "--- changed paths vs $BASE ---"
          cat /tmp/changed.txt
          echo "--- end ---"

          MATRIX="$(python3 .github/workflows/scripts/discover-image-matrix.py \
            --connectors-root src/ingestion/connectors \
            --changed /tmp/changed.txt \
            $ALL_FLAG)"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          LEN="$(echo "$MATRIX" | jq 'length')"
          if [ "$LEN" -gt 0 ]; then
            echo "any=true" >> "$GITHUB_OUTPUT"
          else
            echo "any=false" >> "$GITHUB_OUTPUT"
          fi
          echo "discovered $LEN image entries"
          echo "$MATRIX" | jq . || true

  # ─── Backend per-service builds ────────────────────────────────────────────
  # Split from a single matrix job so that a change touching only one service
  # rebuilds only that image — and only that subchart's `appVersion` gets
  # bumped downstream. This is what makes per-service granularity actually
  # work in the gitops promotion flow (see publish-chart for the appVersion
  # logic).

  backend-api-gateway:
    needs: changes
    if: |
      needs.changes.outputs.api_gateway == 'true'
      || (github.event_name == 'workflow_dispatch' && inputs.frontend_tag == '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/insight-api-gateway
          tags: |
            type=raw,value=${{ needs.changes.outputs.build_tag }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: src/backend
          file: src/backend/services/api-gateway/Dockerfile
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  backend-analytics-api:
    needs: changes
    if: |
      needs.changes.outputs.analytics_api == 'true'
      || (github.event_name == 'workflow_dispatch' && inputs.frontend_tag == '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/insight-analytics-api
          tags: |
            type=raw,value=${{ needs.changes.outputs.build_tag }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: src/backend
          file: src/backend/services/analytics-api/Dockerfile
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  backend-identity:
    needs: changes
    if: |
      needs.changes.outputs.identity == 'true'
      || (github.event_name == 'workflow_dispatch' && inputs.frontend_tag == '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/insight-identity
          tags: |
            type=raw,value=${{ needs.changes.outputs.build_tag }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
      # .NET 9 identity is self-contained — context is the service folder
      # itself, not src/backend/ (no Cargo workspace membership).
      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: src/backend/services/identity
          file: src/backend/services/identity/Dockerfile
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Toolbox build (with dbt parse smoke) ──────────────────────────────────
  # Toolbox is special — it bakes every connector's descriptor.yaml and dbt
  # project at build time, so a descriptor-only change (commit A from
  # bump-descriptors) MUST re-trigger it. paths-filter for `toolbox` matches
  # `src/ingestion/**` (which includes descriptor.yaml).
  toolbox:
    needs: changes
    if: |
      needs.changes.outputs.toolbox == 'true'
      || (github.event_name == 'workflow_dispatch' && inputs.frontend_tag == '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/insight-toolbox
          tags: |
            type=raw,value=${{ needs.changes.outputs.build_tag }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      # Build → validate → push. The build step loads the image into the
      # local Docker daemon so the validate step can `docker run` against it;
      # the push step reuses the buildx cache (essentially free). Without
      # the validate step a broken dbt project (duplicate model name,
      # broken `ref()`, jinja error, schema.yml mismatch) only manifests
      # at first CronWorkflow run in the cluster.
      - name: Build toolbox image (load locally)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: src/ingestion
          file: src/ingestion/tools/toolbox/Dockerfile
          load: true
          push: false
          tags: insight-toolbox:ci-validate
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate dbt project (dbt parse)
        # `dbt parse` exercises the dbt manifest: duplicate model/test
        # names, broken `ref()`/`source()`, jinja syntax errors,
        # schema.yml model patches that don't match a model — all error
        # here. It does NOT execute any SQL against the warehouse: the
        # dummy profile below is never connected, the adapter just
        # needs to be loadable.
        run: |
          mkdir -p /tmp/dbt-ci-profiles
          cat > /tmp/dbt-ci-profiles/profiles.yml <<'YAML'
          ingestion:
            target: ci-parse
            outputs:
              ci-parse:
                type: clickhouse
                host: dummy.local
                port: 8123
                schema: dbt_parse_ci
                user: ci
                password: ci
                secure: false
          YAML
          docker run --rm \
            -v /tmp/dbt-ci-profiles:/profiles:ro \
            -w /ingestion/dbt \
            insight-toolbox:ci-validate \
            dbt parse --profiles-dir /profiles

      - name: Push toolbox image
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: src/ingestion
          file: src/ingestion/tools/toolbox/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

  # ─── Connector image build (matrix-driven, descriptor-discovered) ──────────
  # One matrix leg per `descriptor.yaml.images.<key>` entry that fires this
  # run (see discover-images for the firing rule). Build identity (`name`,
  # `dockerfile`, `context`) is read from the matrix entry — there is no
  # per-connector hardcode in this workflow.
  build-image:
    needs: [changes, discover-images]
    if: needs.discover-images.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJson(needs.discover-images.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.entry.name }}
          tags: |
            type=raw,value=${{ needs.changes.outputs.build_tag }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ${{ matrix.entry.connector_dir }}/${{ matrix.entry.context }}
          file:    ${{ matrix.entry.connector_dir }}/${{ matrix.entry.dockerfile }}
          push:    ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          # Scope cache per image name so unrelated connectors don't evict
          # each other's layer cache.
          cache-from: type=gha,scope=${{ matrix.entry.name }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.entry.name }}

  # ─── Connector descriptor bump ─────────────────────────────────────────────
  # After build-image succeeds on every matrix leg, patch each connector's
  # `descriptor.yaml.images.<key>.image` with the freshly pushed tag, then
  # commit + push WITHOUT [skip ci]. That push re-triggers this workflow:
  # paths-filter sees src/ingestion/** changes and toolbox rebuilds with the
  # patched descriptors baked in; publish-chart in the follow-up run produces
  # the umbrella version bump with [skip ci].
  #
  # The matrix is the universal source of truth for what to patch — every
  # entry that BUILT in this run gets its image field updated. Skipped
  # entries (the matrix was empty or the build job didn't run) → commit
  # short-circuits via the `committed=false` output.
  #
  # See ADR-0016 (descriptor.images: schema) and ADR-0001 (chart-publishing).
  bump-descriptors:
    needs: [changes, discover-images, build-image]
    if: |
      always()
      && github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && needs.discover-images.outputs.any == 'true'
      && needs.build-image.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      # `committed` is set to 'true' when this job actually pushed a
      # descriptor-bump commit. publish-chart reads it to skip itself in
      # THIS run when bump-descriptors made changes — the descriptor commit's
      # push re-triggers the workflow, and publish-chart fires canonically in
      # that follow-up run with toolbox already rebuilt against the patched
      # descriptors. This avoids a double umbrella publish (one with stale
      # toolbox content, one with fresh).
      committed: ${{ steps.commit.outputs.committed }}
    steps:
      - name: Mint chart-release App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.INSIGHT_RELEASE_APP_ID }}
          private-key: ${{ secrets.INSIGHT_RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Patch images.<key>.image refs from matrix
        env:
          BUILD_TAG:    ${{ needs.changes.outputs.build_tag }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          MATRIX:       ${{ needs.discover-images.outputs.matrix }}
        run: |
          set -euo pipefail
          # Iterate every matrix entry (every built image this run) and patch
          # `descriptor.yaml.images.<key>.image` with the new full ref.
          # `field`/`repo` are not hardcoded in this workflow — they live in
          # the descriptor. Multi-image connectors patch multiple keys.
          echo "$MATRIX" | jq -c '.[]' | while IFS= read -r entry; do
            desc="$(echo "$entry" | jq -r '.connector_dir')/descriptor.yaml"
            key="$(echo "$entry"  | jq -r '.key')"
            name="$(echo "$entry" | jq -r '.name')"
            ref="$IMAGE_PREFIX/$name:$BUILD_TAG"
            echo "Patching $desc: images.$key.image = $ref"
            yq -i ".images.\"$key\".image = \"$ref\"" "$desc"
          done

      - name: Bump descriptor.version (minor) for each patched connector
        env:
          MATRIX: ${{ needs.discover-images.outputs.matrix }}
        run: |
          set -euo pipefail
          # Every connector whose image was rebuilt this run gets its
          # descriptor.version bumped by one minor increment (X.Y.Z → X.(Y+1).0).
          # Reconcile then classifies this as `bump_kind: minor` on the next
          # deploy (per ADR-0015) and re-discovers the source catalog without
          # dispatching a `dbt --full-refresh` — the new image is a continuation
          # of the same connector contract, not a breaking change.
          #
          # Dedupe by connector_dir: a single descriptor with multiple image
          # entries gets exactly ONE minor bump per CI run, not one per entry.
          echo "$MATRIX" | jq -r '.[].connector_dir' | sort -u \
            | while IFS= read -r connector_dir; do
              desc="$connector_dir/descriptor.yaml"
              echo "Bumping $desc version (minor):"
              .github/workflows/scripts/bump-descriptor-version.sh --descriptor "$desc"
            done

      - name: Commit descriptor patches (no [skip ci])
        id: commit
        env:
          MATRIX:    ${{ needs.discover-images.outputs.matrix }}
          BUILD_TAG: ${{ needs.changes.outputs.build_tag }}
        run: |
          set -euo pipefail
          git config user.email "ci@constructorfabric.local"
          git config user.name  "insight-ci"

          # Stage every descriptor.yaml that was patched. `sort -u` because
          # multi-image connectors appear once per image entry in the matrix.
          echo "$MATRIX" \
            | jq -r '.[].connector_dir + "/descriptor.yaml"' \
            | sort -u \
            | xargs -r git add

          if git diff --staged --quiet; then
            echo "no descriptor changes to commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "committed=true" >> "$GITHUB_OUTPUT"

          # Connector slugs (basename of each connector_dir) — surface in
          # the commit subject so a reader of `git log` sees what shipped
          # without opening the diff.
          MODIFIED="$(echo "$MATRIX" \
            | jq -r '.[].connector_dir' \
            | sed 's|.*/||' | sort -u | paste -sd, -)"

          # Intentionally NO [skip ci]: the push must re-trigger this
          # workflow so toolbox rebuilds with the patched descriptors and
          # publish-chart produces the umbrella bump.
          git commit -m "chore(descriptors): bump ${MODIFIED} image refs + version (minor) to ${BUILD_TAG}"

          # Push, with one rebase-retry to absorb a race against
          # origin/${GITHUB_REF_NAME} advancing between job start and now.
          # Mirrors publish-chart's policy: rebase once, fail loud on
          # second failure.
          if ! git push origin "HEAD:${GITHUB_REF_NAME}"; then
            echo "push failed; rebasing onto refreshed origin/${GITHUB_REF_NAME} and retrying"
            if ! git pull --rebase origin "${GITHUB_REF_NAME}"; then
              echo "rebase failed (conflict on patched descriptors?); aborting"
              git rebase --abort 2>/dev/null || true
              exit 1
            fi
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

  # ─── Umbrella chart publish ────────────────────────────────────────────────
  # Per merge to main: bump subchart appVersions for whichever services were
  # rebuilt in this run, patch-bump the umbrella version, regenerate
  # Chart.lock, package, push to oci://ghcr.io/constructorfabric/charts/insight,
  # and commit the bumps back to main with [skip ci] so we don't recurse.
  #
  # Skipped in this run when bump-descriptors committed (`committed=true`):
  # the descriptor commit's push re-triggers the workflow, and publish-chart
  # runs canonically in that follow-up run with toolbox already rebuilt
  # against the patched descriptors.
  #
  # See ADR-0001 (docs/components/deployment/specs/ADR/0001-chart-publishing-on-merge.md)
  # and the gitops SPEC §2.4 for the contract.
  publish-chart:
    needs:
      - changes
      - discover-images
      - backend-api-gateway
      - backend-analytics-api
      - backend-identity
      - toolbox
      - build-image
      - bump-descriptors
    if: |
      always()
      && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && github.ref == 'refs/heads/main'
      && (needs.backend-api-gateway.result   == 'success' || needs.backend-api-gateway.result   == 'skipped')
      && (needs.backend-analytics-api.result == 'success' || needs.backend-analytics-api.result == 'skipped')
      && (needs.backend-identity.result      == 'success' || needs.backend-identity.result      == 'skipped')
      && (needs.toolbox.result               == 'success' || needs.toolbox.result               == 'skipped')
      && (needs.build-image.result           == 'success' || needs.build-image.result           == 'skipped')
      && (needs.bump-descriptors.result      == 'success' || needs.bump-descriptors.result      == 'skipped')
      && needs.bump-descriptors.outputs.committed != 'true'
      && (
        needs.changes.outputs.api_gateway   == 'true'
        || needs.changes.outputs.analytics_api == 'true'
        || needs.changes.outputs.identity     == 'true'
        || needs.changes.outputs.toolbox      == 'true'
        || needs.changes.outputs.umbrella     == 'true'
        || inputs.frontend_tag != ''
      )
    runs-on: ubuntu-latest
    steps:
      # Mint a short-lived (1h) installation token from the
      # insight-chart-release-bot GitHub App so the auto-commit push at the
      # end of this job can bypass branch protection on `main`. The App has
      # Contents: read & write on this repo only and is on `main`'s bypass
      # list; default GITHUB_TOKEN cannot bypass, and we explicitly chose
      # App-over-PAT to avoid tying release pushes to a single human.
      # GHCR push (helm registry login below) stays on GITHUB_TOKEN via
      # packages: write — the App was deliberately not granted that scope.
      - name: Mint chart-release App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.INSIGHT_RELEASE_APP_ID }}
          private-key: ${{ secrets.INSIGHT_RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          # Full history needed because we'll commit back to the same branch.
          fetch-depth: 0
          # App token; persists in the git remote so the final `git push`
          # in this job runs as the App and clears `main` branch protection.
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'

      # Per-service subchart appVersion bumps. Each is bumped INDEPENDENTLY,
      # only if the matching image was rebuilt this run. Services whose
      # source didn't change keep their previous appVersion → their image
      # tag in the published chart still resolves to an image that exists.
      - name: Bump per-service subchart appVersions
        env:
          BUILD_TAG:     ${{ needs.changes.outputs.build_tag }}
          API_GATEWAY:   ${{ needs.changes.outputs.api_gateway }}
          ANALYTICS_API: ${{ needs.changes.outputs.analytics_api }}
          IDENTITY:      ${{ needs.changes.outputs.identity }}
        run: |
          set -euo pipefail
          if [ "$API_GATEWAY" = "true" ]; then
            echo "Bumping api-gateway subchart appVersion → $BUILD_TAG"
            yq -i ".appVersion = \"$BUILD_TAG\"" src/backend/services/api-gateway/helm/Chart.yaml
          fi
          if [ "$ANALYTICS_API" = "true" ]; then
            echo "Bumping analytics-api subchart appVersion → $BUILD_TAG"
            yq -i ".appVersion = \"$BUILD_TAG\"" src/backend/services/analytics-api/helm/Chart.yaml
          fi
          if [ "$IDENTITY" = "true" ]; then
            echo "Bumping identity subchart appVersion → $BUILD_TAG"
            yq -i ".appVersion = \"$BUILD_TAG\"" src/backend/services/identity/helm/Chart.yaml
          fi

      # Cross-repo frontend bump. The frontend lives in
      # constructorfabric/insight-front and builds its own image; on
      # publish-to-main its CI dispatches THIS workflow with frontend_tag
      # set to the just-built tag. We mirror that into the frontend
      # subchart's appVersion so the deploy path resolves the right image.
      - name: Bump frontend subchart appVersion (cross-repo dispatch)
        if: inputs.frontend_tag != ''
        env:
          FRONTEND_TAG: ${{ inputs.frontend_tag }}
        run: |
          set -euo pipefail
          echo "Bumping frontend subchart appVersion → $FRONTEND_TAG"
          yq -i ".appVersion = \"$FRONTEND_TAG\"" src/frontend/helm/Chart.yaml

      - name: Bump ingestion toolbox image ref
        env:
          BUILD_TAG: ${{ needs.changes.outputs.build_tag }}
          TOOLBOX: ${{ needs.changes.outputs.toolbox }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          set -euo pipefail
          # toolbox is the only ingestion image still pinned in
          # charts/insight/values.yaml — connector image refs travel inside
          # the toolbox image's baked descriptors (ADR-0016). Connector
          # descriptors are patched by `bump-descriptors` in a separate
          # commit (without [skip ci]) BEFORE this run.
          if [ "$TOOLBOX" = "true" ]; then
            REF="$IMAGE_PREFIX/insight-toolbox:$BUILD_TAG"
            echo "Setting ingestion.toolboxImage → $REF"
            yq -i ".ingestion.toolboxImage = \"$REF\"" charts/insight/values.yaml
          fi

      # Umbrella `version` always patch-bumps (semver, per-publish contract).
      # Umbrella `appVersion` is DISPLAY-ONLY in the deploy path — the actual
      # image.tag for each pod is resolved inside that pod's subchart from
      # the SUBCHART's appVersion. We set the umbrella appVersion to the MAX
      # of the four subchart appVersions so it summarises "the newest image
      # tag bundled in this chart artifact". `sort -V` handles the
      # YYYY.MM.DD.HH.MM-shortsha format correctly because the date prefix
      # is lexicographically sortable.
      - name: Bump umbrella version
        id: umbrella
        run: |
          set -euo pipefail
          CURRENT="$(yq '.version' charts/insight/Chart.yaml)"
          NEXT="$(echo "$CURRENT" | awk -F. '{ printf "%d.%d.%d", $1, $2, $3+1 }')"
          NEW_APP=$(yq -r '.appVersion' \
            src/backend/services/api-gateway/helm/Chart.yaml \
            src/backend/services/analytics-api/helm/Chart.yaml \
            src/backend/services/identity/helm/Chart.yaml \
            src/frontend/helm/Chart.yaml \
            | sort -V | tail -1)
          echo "Umbrella version $CURRENT → $NEXT (appVersion → $NEW_APP)"
          yq -i ".version = \"$NEXT\""        charts/insight/Chart.yaml
          yq -i ".appVersion = \"$NEW_APP\""  charts/insight/Chart.yaml
          # Mirror the new chart version into the sample gitops starter
          # at docs/deploy/.insight-version so external operators tracking
          # `main` pick up new chart releases on the next `git pull`.
          if [ -f docs/deploy/.insight-version ]; then
            echo "$NEXT" > docs/deploy/.insight-version
          fi
          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"

      - name: Helm dependency update
        run: helm dependency update charts/insight

      - name: Helm package
        run: |
          mkdir -p dist
          helm package charts/insight -d dist/

      - name: Helm registry login (GHCR)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Helm push
        run: |
          helm push "dist/insight-${{ steps.umbrella.outputs.version }}.tgz" \
            oci://ghcr.io/constructorfabric/charts

      - name: Commit version bumps back to main
        env:
          UMBRELLA_VERSION: ${{ steps.umbrella.outputs.version }}
          BUILD_TAG: ${{ needs.changes.outputs.build_tag }}
        run: |
          set -euo pipefail
          git config user.email "ci@constructorfabric.local"
          git config user.name  "insight-ci"

          git add charts/insight/Chart.yaml \
                  charts/insight/Chart.lock \
                  charts/insight/values.yaml \
                  src/backend/services/api-gateway/helm/Chart.yaml \
                  src/backend/services/analytics-api/helm/Chart.yaml \
                  src/backend/services/identity/helm/Chart.yaml \
                  src/frontend/helm/Chart.yaml
          # Sample gitops starter under docs/deploy — pin moves with the
          # umbrella. Stage only if present (the file is introduced by
          # the gitops-sample PR and only lives on `main` after it merges).
          if [ -f docs/deploy/.insight-version ]; then
            git add docs/deploy/.insight-version
          fi

          if git diff --staged --quiet; then
            echo "no version changes to commit"
            exit 0
          fi

          # [skip ci] in the message prevents the push from re-triggering
          # this workflow. paths-filter on the next real merge will diff
          # against THIS commit, so service-file changes are correctly
          # detected on the subsequent run.
          git commit -m "chore(release): umbrella ${UMBRELLA_VERSION} (build ${BUILD_TAG}) [skip ci]"

          # Push, with one rebase-retry to absorb a race against
          # origin/${GITHUB_REF_NAME} advancing between job start and now.
          # Mirrors the gitops poller's policy: rebase once, fail loud on
          # second failure.
          if ! git push origin "HEAD:${GITHUB_REF_NAME}"; then
            echo "push failed; rebasing onto refreshed origin/${GITHUB_REF_NAME} and retrying"
            if ! git pull --rebase origin "${GITHUB_REF_NAME}"; then
              echo "rebase failed (conflict on bumped files?); aborting"
              git rebase --abort 2>/dev/null || true
              exit 1
            fi
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
