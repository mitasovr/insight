name: Connector Enrich — Test

# Per-connector unit tests for the compiled "enrich" binaries
# (src/ingestion/connectors/*/*/enrich). A PR that changes a connector's
# enrich/ runs ONLY that connector's `cargo test` as its own matrix leg.
# Discovery reuses scripts/discover-image-matrix.py (the same descriptor
# `images:` scanner build-images.yml uses) filtered to the `enrich` image key,
# so an enrich crate fires only when a path under <connector_dir>/<context>
# (its enrich dir) changed — the descriptor.yaml itself is excluded.

on:
  pull_request:
    branches: [main]
    paths:
      - "src/ingestion/connectors/**/enrich/**"
      - ".github/workflows/connector-enrich-tests.yml"
      - ".github/workflows/scripts/discover-image-matrix.py"
  workflow_dispatch:

concurrency:
  group: connector-enrich-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.scan.outputs.matrix }}
      any: ${{ steps.scan.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install PyYAML
        run: python3 -m pip install --quiet pyyaml
      - name: Discover changed enrich crates
        id: scan
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BASE="$PR_BASE_SHA"; ALL_FLAG=""
          else
            BASE=""; ALL_FLAG="--all"
          fi
          if [ -n "$BASE" ] && git rev-parse "$BASE" >/dev/null 2>&1; then
            git diff --name-only "$BASE" "$GITHUB_SHA" > /tmp/changed.txt || true
          else
            : > /tmp/changed.txt
          fi
          echo "--- changed paths ---"; cat /tmp/changed.txt; echo "--- end ---"
          ALL_IMAGES="$(python3 .github/workflows/scripts/discover-image-matrix.py \
            --connectors-root src/ingestion/connectors \
            --changed /tmp/changed.txt \
            $ALL_FLAG)"
          MATRIX="$(echo "$ALL_IMAGES" | jq -c '[.[] | select(.key == "enrich")]')"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          LEN="$(echo "$MATRIX" | jq 'length')"
          if [ "$LEN" -gt 0 ]; then echo "any=true" >> "$GITHUB_OUTPUT"; else echo "any=false" >> "$GITHUB_OUTPUT"; fi
          echo "enrich crates to test: $LEN"
          echo "$MATRIX" | jq . || true

  test:
    needs: discover
    if: needs.discover.outputs.any == 'true'
    runs-on: ubuntu-latest
    name: test ${{ matrix.entry.name }}
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.entry.connector_dir }}/${{ matrix.entry.context }} -> target
      - name: cargo test
        working-directory: ${{ matrix.entry.connector_dir }}/${{ matrix.entry.context }}
        # Core tests only (default features — no `io`, so no ClickHouse dep):
        # fast and deterministic. The full --features io binary is exercised by
        # the image build in build-images.yml.
        run: cargo test
