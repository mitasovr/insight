{{- /*
Anchor `insight.validate` in a normal template so it runs under
`helm lint` (which does not render NOTES.txt). The validator emits
no output on success — `fail`s on missing required fields. */ -}}
{{- include "insight.validate" . }}
{{- $obs := default dict .Values.observability -}}
{{- $obsLogs := default dict $obs.logs -}}
{{- $obsOtlp := default dict $obs.otlp -}}
{{- $otlpEndpoint := default "" $obsOtlp.endpoint -}}
{{/*
Single ConfigMap that exposes all resolved infra coordinates.

Any pod in the insight namespace mounts it via envFrom:
  envFrom:
    - configMapRef:
        name: {{ .Release.Name }}-platform

and gets a set of env variables: CLICKHOUSE_URL, MARIADB_HOST,
AIRBYTE_API_URL, etc. — regardless of whether the services are
internal or external (the difference is hidden inside helpers).

This is the only place in the umbrella where DNS names of services
are visible. If SRE asks to rename something, only _helpers.tpl changes.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-platform
  labels:
    {{- include "insight.labels" . | nindent 4 }}
data:
  # ─── ClickHouse ───
  CLICKHOUSE_HOST:     {{ include "insight.clickhouse.host" .      | quote }}
  CLICKHOUSE_PORT:     {{ include "insight.clickhouse.port" .      | quote }}
  CLICKHOUSE_URL:      {{ include "insight.clickhouse.url" .       | quote }}
  CLICKHOUSE_DATABASE: {{ include "insight.clickhouse.database" .  | quote }}
  CLICKHOUSE_USER:     {{ required "clickhouse.username is required" .Values.clickhouse.username | quote }}

  # ─── MariaDB ───
  MARIADB_HOST:     {{ include "insight.mariadb.host" .     | quote }}
  MARIADB_PORT:     {{ include "insight.mariadb.port" .     | quote }}
  MARIADB_DATABASE: {{ include "insight.mariadb.database" . | quote }}
  MARIADB_USERNAME: {{ required "mariadb.username is required" .Values.mariadb.username | quote }}

  # ─── Redis ───
  REDIS_HOST: {{ include "insight.redis.host" . | quote }}
  REDIS_PORT: {{ include "insight.redis.port" . | quote }}

  # ─── Redpanda (Kafka-compatible) ───
  REDPANDA_BROKERS: {{ include "insight.redpanda.brokers" . | quote }}

  # ─── Airbyte (separate L2 release, see deploy/gitops/system/airbyte) ───
  AIRBYTE_API_URL:          {{ include "insight.airbyte.url" . | quote }}
  AIRBYTE_JWT_SECRET_NAME:  {{ .Values.airbyte.jwtSecret.name  | quote }}
  AIRBYTE_JWT_SECRET_KEY:   {{ .Values.airbyte.jwtSecret.key   | quote }}

  # ─── App service hosts (for sidecars and debugging) ───
  INSIGHT_API_GATEWAY_HOST:   {{ include "insight.apiGateway.host"   . | quote }}
  INSIGHT_ANALYTICS_API_HOST: {{ include "insight.analyticsApi.host" . | quote }}
  INSIGHT_IDENTITY_HOST:      {{ include "insight.identity.host"     . | quote }}
  INSIGHT_FRONTEND_HOST:      {{ include "insight.frontend.host"     . | quote }}

  # ─── Observability (emission contract) ───
  # JSON-to-stdout is always on; this is the log level plus, when an OTLP
  # endpoint is configured, where to export. Standard OTel env var names so
  # any OTel SDK (.NET, Python) picks them up with zero custom glue. Each
  # service still sets its OWN OTEL_SERVICE_NAME. No endpoint → no OTEL_*
  # vars → services log to stdout only and whoever runs the cluster collects.
  INSIGHT_LOG_LEVEL: {{ $obsLogs.level | default "info" | quote }}
  {{- if $otlpEndpoint }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ $otlpEndpoint | quote }}
  OTEL_EXPORTER_OTLP_PROTOCOL: {{ $obsOtlp.protocol | default "grpc" | quote }}
  OTEL_LOGS_EXPORTER:          "otlp"
  # Hardcoded off until the tracing phase (Tempo) — flip to "otlp" then.
  OTEL_TRACES_EXPORTER:        "none"
  {{- end }}
