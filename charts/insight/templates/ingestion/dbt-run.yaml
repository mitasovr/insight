{{- if .Values.ingestion.templates.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: dbt-run
  labels:
    {{- include "insight.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingestion-template
spec:
  serviceAccountName: argo-workflow
  entrypoint: run
  templates:
    - name: run
      # SECURITY:
      #  Argo substitutes parameter refs as LITERAL TEXT at render time —
      #  splicing them into shell, Python, or YAML source is a command-
      #  injection sink. We pass every parameter via env vars and reference
      #  them as `"$ENV_VAR"` in the shell, which is not parsed as code by
      #  bash. See ingestion-templates SECURITY notes in DESIGN.md.
      inputs:
        parameters:
          - name: dbt_select
          # One-shot full-refresh flag per ADR-0015. Set to "true" by the
          # reconcile sync-trigger when a connector's major version was
          # bumped this run; scoped via dbt_select to that connector's
          # downstream models only (no cross-connector cascade). Empty/
          # "false" runs incremental.
          - name: dbt_full_refresh
            default: "false"
          # Operator-pinned values from umbrella chart. Submitter may override
          # per-call but typically just submits and gets these defaults baked in
          # at chart-render time. `insight.<dep>.host/port` helpers resolve the
          # operator-supplied external L2 host/port.
          - name: toolbox_image
            default: {{ required "ingestion.toolboxImage is required when ingestion.templates.enabled=true" .Values.ingestion.toolboxImage | quote }}
          - name: clickhouse_host
            default: {{ include "insight.clickhouse.fqdn" . | quote }}
          - name: clickhouse_port
            default: {{ include "insight.clickhouse.port" . | quote }}
          - name: clickhouse_user
            default: {{ required "clickhouse.username is required" .Values.clickhouse.username | quote }}
      # 2h. Incremental dbt runs finish in seconds, but full-refresh
      # (triggered manually or by a future major-bump dispatch per
      # PR #456 / ADR-0015) can rebuild the entire staging+silver
      # layer for a connector. 30m caps were observed killing the
      # job on hubspot full-refresh.
      activeDeadlineSeconds: 7200
      script:
        image: {{ `"{{inputs.parameters.toolbox_image}}"` }}
        # IfNotPresent so dev clusters use the locally-built `insight-toolbox:local`
        # loaded into Kind via `kind load docker-image` (same convention as
        # tt-enrich-jira-run.yaml). Production overlays should set their own
        # registry-pinned tag in `ingestion.toolboxImage` and rely on registry pulls.
        imagePullPolicy: IfNotPresent
        command: [bash]
        env:
          - name: CLICKHOUSE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ required "clickhouse.passwordSecret.name is required" .Values.clickhouse.passwordSecret.name | quote }}
                key:  {{ required "clickhouse.passwordSecret.key is required"  .Values.clickhouse.passwordSecret.key  | quote }}
          - name: DBT_SELECT
            value: {{ `"{{inputs.parameters.dbt_select}}"` }}
          - name: DBT_FULL_REFRESH
            value: {{ `"{{inputs.parameters.dbt_full_refresh}}"` }}
          - name: CLICKHOUSE_HOST
            value: {{ `"{{inputs.parameters.clickhouse_host}}"` }}
          - name: CLICKHOUSE_PORT
            value: {{ `"{{inputs.parameters.clickhouse_port}}"` }}
          - name: CLICKHOUSE_USER
            value: {{ `"{{inputs.parameters.clickhouse_user}}"` }}
        source: |
          set -euo pipefail
          cd /ingestion/dbt
          # `python3 - <<'PY'` writes profiles.yml from env vars without ever
          # interpolating user input into YAML or shell text — closes the
          # parameter-injection sink that splicing into a heredoc would open.
          python3 - <<'PY'
          import os, yaml
          profile = {
              "ingestion": {
                  "target": "k8s",
                  "outputs": {
                      "k8s": {
                          "type": "clickhouse",
                          "host": os.environ["CLICKHOUSE_HOST"],
                          "port": int(os.environ["CLICKHOUSE_PORT"]),
                          "schema": "silver",
                          "user": os.environ["CLICKHOUSE_USER"],
                          "password": os.environ["CLICKHOUSE_PASSWORD"],
                          "secure": False,
                          "send_receive_timeout": 1500,
                          "query_limit": 0,
                          "connect_timeout": 30,
                      }
                  }
              }
          }
          with open("profiles.yml", "w") as f:
              yaml.safe_dump(profile, f)
          PY
          # `dbt run --select ""` matches NOTHING (not "all models") —
          # ${VAR:+...} drops the flag entirely when DBT_SELECT is empty
          # so manual triggers without the parameter run all models.
          # DBT_FULL_REFRESH="true" appends --full-refresh per ADR-0015;
          # any other value (false / empty) runs incremental.
          # --log-format json: structured per-model output for the log
          # collector (Alloy maps dbt's nested info.level/info.name).
          # The if/else (instead of `dbt ...; RC=$?`) keeps the terminal
          # dbt.completed event below alive under `set -e`.
          T0=$(date +%s); RC=0
          if [[ "${DBT_FULL_REFRESH:-false}" == "true" ]]; then
            dbt run --profiles-dir . --log-format json --full-refresh ${DBT_SELECT:+--select "$DBT_SELECT"} || RC=$?
          else
            dbt run --profiles-dir . --log-format json ${DBT_SELECT:+--select "$DBT_SELECT"} || RC=$?
          fi
          # Lifecycle event for the high-level "dbt run finished after N
          # minutes, success/failed" view; python3 keeps the JSON safe
          # against whatever characters ride in DBT_SELECT.
          DBT_RC="$RC" DBT_DURATION_MS=$(( ($(date +%s) - T0) * 1000 )) python3 - <<'PY'
          import json, os, time
          rc = int(os.environ["DBT_RC"])
          print(json.dumps({
              "ts": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "level": "info" if rc == 0 else "error",
              "component": "dbt",
              "event": "dbt.completed",
              "status": "success" if rc == 0 else "failed",
              "exit_code": rc,
              "duration_ms": int(os.environ["DBT_DURATION_MS"]),
              "select": os.environ.get("DBT_SELECT", ""),
              "full_refresh": os.environ.get("DBT_FULL_REFRESH", "false") == "true",
          }), flush=True)
          PY
          exit "$RC"
{{- end }}
