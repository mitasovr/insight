{{- if .Values.ingestion.templates.enabled }}
{{- /*
Argo parameter references ({{inputs.parameters.foo}}, {{steps.x.outputs.result}})
are escaped with Go-template raw-string literals (`…`) so Helm emits them
verbatim for Argo to resolve at workflow-run time. Helm-resolved values are
unescaped: they use `include` helpers and .Values references directly.

SECURITY:
  Argo substitutes parameter refs as LITERAL TEXT. Splicing them
  directly into Python source enables arbitrary code execution by any
  submitter — e.g. a crafted connection_id can become valid Python.
  Mitigation: every workflow-time parameter is exposed to the Python
  script via env vars (os.environ[...]); the Python source is a static,
  parameter-free string.
*/}}
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: airbyte-sync
  labels:
    {{- include "insight.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingestion-template
spec:
  # Without this, manual `kubectl create -f` triggers fall back to the
  # namespace default SA and fail on `workflowtaskresults.argoproj.io`
  # RBAC (exit code 64). CronWorkflow callers also pin the same SA via
  # render templates.
  serviceAccountName: argo-workflow
  arguments:
    parameters:
      - name: connection_name
      - name: connector
        value: ""
      - name: tenant
        value: ""
      - name: airbyte_url
        value: {{ include "insight.airbyte.url" . | quote }}
  entrypoint: main
  templates:
    - name: main
      inputs:
        parameters:
          - name: connection_name
          - name: airbyte_url
      steps:
        - - name: resolve-connection-by-name
            template: resolve-connection-by-name
            arguments:
              parameters:
                - name: connection_name
                  value: {{ `"{{inputs.parameters.connection_name}}"` }}
                - name: airbyte_url
                  value: {{ `"{{inputs.parameters.airbyte_url}}"` }}
        - - name: sync
            template: sync
            arguments:
              parameters:
                - name: connection_id
                  value: {{ `"{{steps.resolve-connection-by-name.outputs.parameters.connection_id}}"` }}
                - name: airbyte_url
                  value: {{ `"{{inputs.parameters.airbyte_url}}"` }}

    - name: resolve-connection-by-name
      retryStrategy:
        limit: 3
        retryPolicy: OnError
        backoff:
          duration: "30s"
          factor: 2
          maxDuration: "5m"
      inputs:
        parameters:
          - name: connection_name
          - name: airbyte_url
      outputs:
        parameters:
          - name: connection_id
            valueFrom:
              path: /tmp/connection_id.txt
      script:
        image: {{ required "ingestion.toolboxImage is required when ingestion.templates.enabled=true" .Values.ingestion.toolboxImage | quote }}
        command: [bash]
        env:
          - name: AIRBYTE_URL
            value: {{ `"{{inputs.parameters.airbyte_url}}"` }}
          - name: INSIGHT_NAMESPACE
            value: {{ .Release.Namespace | quote }}
          - name: CONNECTORS_DIR
            value: "/ingestion/connectors"
        source: |
          set -euo pipefail
          source /ingestion/reconcile-connectors/lib/airbyte.sh
          source /ingestion/reconcile-connectors/lib/argo.sh
          name='{{ `{{inputs.parameters.connection_name}}` }}'
          if ! id="$(argo_resolve_connection_id_by_name "$name")"; then
            echo "ERROR: connection name not found: $name" >&2
            exit 1
          fi
          printf '%s' "$id" > /tmp/connection_id.txt

    - name: sync
      inputs:
        parameters:
          - name: connection_id
          - name: airbyte_url
      steps:
        - - name: trigger
            template: trigger-sync
            arguments:
              parameters:
                - name: connection_id
                  value: {{ `"{{inputs.parameters.connection_id}}"` }}
                - name: airbyte_url
                  value: {{ `"{{inputs.parameters.airbyte_url}}"` }}
        - - name: poll
            template: poll-job
            arguments:
              parameters:
                - name: job_id
                  value: {{ `"{{steps.trigger.outputs.result}}"` }}
                - name: airbyte_url
                  value: {{ `"{{inputs.parameters.airbyte_url}}"` }}

    - name: trigger-sync
      retryStrategy:
        limit: 3
        retryPolicy: OnError
        backoff:
          duration: "30s"
          factor: 2
          maxDuration: "5m"
      inputs:
        parameters:
          - name: connection_id
          - name: airbyte_url
      script:
        image: python:3.12-alpine
        command: [python3]
        env:
          # OAuth client_credentials against /api/v1/applications/token. The
          # legacy self-minted HMAC JWT is rejected by Airbyte 1.7+ (the
          # request hangs ~5 min then RST). Per ADR-0013, every workflow
          # API call goes through the same instance-admin OAuth flow that
          # reconcile uses.
          - name: AIRBYTE_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: {{ required "airbyte.authSecret.name is required" .Values.airbyte.authSecret.name | quote }}
                key:  {{ default "instance-admin-client-id" .Values.airbyte.authSecret.clientIdKey | quote }}
          - name: AIRBYTE_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: {{ required "airbyte.authSecret.name is required" .Values.airbyte.authSecret.name | quote }}
                key:  {{ default "instance-admin-client-secret" .Values.airbyte.authSecret.clientSecretKey | quote }}
          - name: CONNECTION_ID
            value: {{ `"{{inputs.parameters.connection_id}}"` }}
          - name: AIRBYTE_URL
            value: {{ `"{{inputs.parameters.airbyte_url}}"` }}
        source: |
          import urllib.request, urllib.error, json, sys, os
          def oauth_token():
              body = json.dumps({
                  "client_id":     os.environ["AIRBYTE_CLIENT_ID"],
                  "client_secret": os.environ["AIRBYTE_CLIENT_SECRET"],
                  "grant_type":    "client_credentials",
              }).encode()
              req = urllib.request.Request(
                  f"{os.environ['AIRBYTE_URL']}/api/v1/applications/token",
                  data=body, headers={"Content-Type": "application/json"})
              return json.load(urllib.request.urlopen(req, timeout=30))["access_token"]
          token = oauth_token()
          headers = {"Content-Type": "application/json", "Authorization": f"Bearer {token}"}
          data = json.dumps({"connectionId": os.environ["CONNECTION_ID"]}).encode()
          req = urllib.request.Request(f"{os.environ['AIRBYTE_URL']}/api/v1/connections/sync", data=data, headers=headers)
          try:
              resp = json.load(urllib.request.urlopen(req, timeout=120))
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"Airbyte API error {e.code}: {body}", file=sys.stderr)
              sys.exit(1)
          # Lifecycle event goes to STDERR: stdout is this step's Argo
          # outputs.result (the bare job id consumed by poll-job) and must
          # stay single-line. The collector ingests both streams alike.
          import time
          print(json.dumps({
              "ts": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "level": "info",
              "component": "airbyte-sync",
              "event": "sync.triggered",
              "connection_id": os.environ["CONNECTION_ID"],
              "job_id": resp["job"]["id"],
          }), file=sys.stderr, flush=True)
          print(resp["job"]["id"])

    - name: poll-job
      retryStrategy:
        limit: 3
        retryPolicy: OnError
        backoff:
          duration: "30s"
          factor: 2
          maxDuration: "5m"
      inputs:
        parameters:
          - name: job_id
          - name: airbyte_url
      # 48h absolute backstop only — the script below enforces a
      # progress-based (idle) timeout, so a legitimate long sync
      # (youtrack issue_history initial full-refresh, hubspot archived
      # streams) can run as long as it is actually emitting records
      # without tripping a wall-clock cap. This number is the runaway
      # ceiling: if the polling logic itself wedges or Airbyte returns
      # bytes-emitting churn forever, k8s still kills the pod.
      activeDeadlineSeconds: 172800
      script:
        image: python:3.12-alpine
        command: [python3]
        env:
          - name: AIRBYTE_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: {{ required "airbyte.authSecret.name is required" .Values.airbyte.authSecret.name | quote }}
                key:  {{ default "instance-admin-client-id" .Values.airbyte.authSecret.clientIdKey | quote }}
          - name: AIRBYTE_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: {{ required "airbyte.authSecret.name is required" .Values.airbyte.authSecret.name | quote }}
                key:  {{ default "instance-admin-client-secret" .Values.airbyte.authSecret.clientSecretKey | quote }}
          - name: JOB_ID
            value: {{ `"{{inputs.parameters.job_id}}"` }}
          - name: AIRBYTE_URL
            value: {{ `"{{inputs.parameters.airbyte_url}}"` }}
          # Progress-watchdog knobs. The poll loop tracks a tuple of
          # (status, bytesEmitted, recordsEmitted, stateMessagesEmitted)
          # on the latest attempt. Any change resets the idle timer;
          # no change for IDLE_THRESHOLD_SECONDS → exit with a clear
          # "no progress" failure (distinct from the SIGTERM that
          # activeDeadlineSeconds produces). Override per-env via
          # Helm values if a tenant has unusually slow paginated
          # streams (e.g. heavily-rate-limited APIs).
          - name: POLL_INTERVAL_SECONDS
            value: {{ default 30  .Values.ingestion.airbyteSync.pollIntervalSeconds | quote }}
          - name: IDLE_THRESHOLD_SECONDS
            value: {{ default 1800 .Values.ingestion.airbyteSync.idleThresholdSeconds | quote }}
        source: |
          import urllib.request, urllib.error, json, time, sys, os
          def oauth_token():
              body = json.dumps({
                  "client_id":     os.environ["AIRBYTE_CLIENT_ID"],
                  "client_secret": os.environ["AIRBYTE_CLIENT_SECRET"],
                  "grant_type":    "client_credentials",
              }).encode()
              req = urllib.request.Request(
                  f"{os.environ['AIRBYTE_URL']}/api/v1/applications/token",
                  data=body, headers={"Content-Type": "application/json"})
              return json.load(urllib.request.urlopen(req, timeout=30))["access_token"]

          def attempt_progress(resp):
              # Latest attempt's totalStats — emitted-by-source counters
              # tick on every record/state message Airbyte sees, so they
              # are the cheapest reliable progress signal (cheaper than
              # streamStats, which is per-stream and grows).
              attempts = resp.get("attempts") or []
              if not attempts:
                  return None
              a = attempts[-1].get("attempt", {})
              ts = a.get("totalStats") or {}
              return (
                  a.get("status"),
                  int(ts.get("bytesEmitted")        or a.get("bytesSynced")   or 0),
                  int(ts.get("recordsEmitted")      or a.get("recordsSynced") or 0),
                  int(ts.get("stateMessagesEmitted") or 0),
              )

          job_id = int(os.environ["JOB_ID"])
          airbyte_url = os.environ["AIRBYTE_URL"]
          poll_interval = int(os.environ["POLL_INTERVAL_SECONDS"])
          idle_threshold = int(os.environ["IDLE_THRESHOLD_SECONDS"])

          t0 = time.time()
          def emit_completed(status, exit_code):
              # One structured terminal event per sync for the high-level
              # "sync finished after N minutes, success/failed" view.
              # duration_ms counts from poll start — the trigger step runs
              # seconds earlier, so this tracks the sync wall-clock closely.
              p = last_progress or (None, 0, 0, 0)
              print(json.dumps({
                  "ts": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
                  "level": "info" if exit_code == 0 else "error",
                  "component": "airbyte-sync",
                  "event": "sync.completed",
                  "job_id": job_id,
                  "status": status,
                  "duration_ms": int((time.time() - t0) * 1000),
                  "bytes": p[1],
                  "records": p[2],
              }), flush=True)

          last_progress = None
          last_progress_at = time.time()
          while True:
              # Token TTL is short (~minutes); re-mint per loop iteration.
              # Wrap the network calls (token mint + jobs/get): a transient blip
              # (token endpoint hiccup, timeout, 5xx) must retry the loop, not
              # crash the watchdog. Previously an unhandled exception here exited
              # 1 and killed the poll — so the idle-stuck-job detector below never
              # ran, and a hung Airbyte job sat "running" indefinitely.
              try:
                  token = oauth_token()
                  headers = {"Content-Type": "application/json", "Authorization": f"Bearer {token}"}
                  req = urllib.request.Request(
                      f"{airbyte_url}/api/v1/jobs/get",
                      data=json.dumps({"id": job_id}).encode(),
                      headers=headers)
                  resp = json.load(urllib.request.urlopen(req, timeout=30))
              except Exception as e:
                  print(f"poll: transient error fetching job status: {e!r}; retrying in {poll_interval}s", flush=True)
                  time.sleep(poll_interval)
                  continue
              status = resp["job"]["status"]
              progress = attempt_progress(resp)
              now = time.time()
              if progress is not None and progress != last_progress:
                  last_progress = progress
                  last_progress_at = now
                  print(f"Job {job_id} status={status} bytes={progress[1]} records={progress[2]} states={progress[3]}", flush=True)
              else:
                  idle_for = int(now - last_progress_at)
                  print(f"Job {job_id} status={status} no-progress-for={idle_for}s threshold={idle_threshold}s", flush=True)
                  if idle_for > idle_threshold:
                      print(f"FAIL: Airbyte job has not emitted any record/byte/state for {idle_for}s (threshold {idle_threshold}s). Treating as stuck.", flush=True)
                      emit_completed("stuck", 2)
                      sys.exit(2)
              if status == "succeeded":
                  print("Sync complete")
                  emit_completed("succeeded", 0)
                  sys.exit(0)
              elif status in ("failed", "cancelled"):
                  print(f"Sync failed: {status}")
                  emit_completed(status, 1)
                  sys.exit(1)
              time.sleep(poll_interval)
{{- end }}
